<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="N&K On Time" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>N &amp; K On Time Mobile Tires — Business Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="./icon.png">
  <link rel="apple-touch-icon" href="./icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./icon.png">
  <link rel="manifest" href="./manifest.json">
<style>
  :root {
    --bg:          #0a0a0f;
    --s1:          #13131a;
    --s2:          #1c1c26;
    --s3:          #242432;
    --s4:          #2e2e40;
    --border:      rgba(255,255,255,.06);
    --border2:     rgba(255,255,255,.03);
    --t1: #f0f0fa;
    --t2: #8888a8;
    --t3: #44445a;
    --blue:        #4f8ef7;
    --blue-dim:    rgba(79,142,247,.12);
    --blue-glow:   rgba(79,142,247,.25);
    --orange:      #ff7d3b;
    --orange-dim:  rgba(255,125,59,.12);
    --orange-glow: rgba(255,125,59,.3);
    --green:       #22c55e;
    --green-dim:   rgba(34,197,94,.12);
    --red:         #ef4444;
    --red-dim:     rgba(239,68,68,.10);
    --red-bg:      rgba(239,68,68,.10);
    --amber:       #f59e0b;
    --amber-dim:   rgba(245,158,11,.10);
    --amber-bg:    rgba(245,158,11,.10);
    --gold:        #c8a44a;
    --gold-dim:    rgba(200,164,74,.12);
    --gold-bg:     rgba(200,164,74,.12);
    --r1:   22px;
    --r2:   16px;
    --r3:   12px;
    --r4:   8px;
    --r-sm: 12px;
    --r-xs: 8px;
    --sh-card:  0 1px 0 rgba(255,255,255,.04) inset, 0 4px 24px rgba(0,0,0,.5);
    --sh-hero:  0 0 0 1px rgba(79,142,247,.2), 0 8px 40px rgba(79,142,247,.15);
    --sh-cta:   0 0 0 1px rgba(255,125,59,.25), 0 8px 32px rgba(255,125,59,.2);
    --sh-float: 0 12px 48px rgba(0,0,0,.7);
  }
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body,#root { height:100%; font-family:"IBM Plex Sans",sans-serif; background:var(--bg); overflow:hidden; color:var(--t1); }
  input,select,textarea,button { font-family:"IBM Plex Sans",sans-serif; }
  input,select,textarea { font-size:16px !important; color:var(--t1); }
  button { cursor:pointer; }
  .app { height:100%; display:flex; flex-direction:column; }
  .screen { background:var(--bg); min-height:100%; }
  .page { padding:20px 16px calc(120px + env(safe-area-inset-bottom)); }

  @keyframes fadeSlideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeSlideIn { from{opacity:0;transform:translateX(-12px)} to{opacity:1;transform:translateX(0)} }
  @keyframes scaleIn    { from{opacity:0;transform:scale(.92)} to{opacity:1;transform:scale(1)} }
  @keyframes shimmer    { 0%{background-position:-200% center} 100%{background-position:200% center} }
  @keyframes heroGlow   { 0%,100%{opacity:.6} 50%{opacity:1} }
  @keyframes countUp    { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes pulse      { 0%,100%{opacity:1} 50%{opacity:.3} }
  @keyframes logoPulse  { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.55;transform:scale(.94)} }
  .syncing    { animation:pulse 1.4s infinite; }
  .logo-pulse { animation:logoPulse 2s ease-in-out infinite; }
  .page-enter { animation:fadeSlideUp .25s cubic-bezier(.4,0,.2,1) both; }
  .card-anim  { animation:fadeSlideUp .28s cubic-bezier(.4,0,.2,1) both; }
  .card-anim:nth-child(1){animation-delay:.02s}
  .card-anim:nth-child(2){animation-delay:.05s}
  .card-anim:nth-child(3){animation-delay:.08s}
  .card-anim:nth-child(4){animation-delay:.10s}
  .card-anim:nth-child(5){animation-delay:.12s}
  .card-anim:nth-child(6){animation-delay:.14s}
  .card-anim:nth-child(n+7){animation:none !important; opacity:1}
  @media (prefers-reduced-motion: reduce) {
    .card-anim, .page-enter { animation:none !important; opacity:1 !important; transform:none !important; }
  }
  .press-scale { transition:transform .1s,opacity .1s; }
  .press-scale:active { transform:scale(.96); opacity:.85; }
  .shimmer-text {
    background:linear-gradient(90deg,var(--t1) 25%,var(--orange) 50%,var(--t1) 75%);
    background-size:200% auto;
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shimmer 3s linear infinite;
  }

  .header-compact {
    background:linear-gradient(180deg,#16161f 0%,#0f0f17 100%);
    padding:12px 18px; padding-top:calc(12px + env(safe-area-inset-top));
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    flex-shrink:0; border-bottom:1px solid var(--border);
    box-shadow:0 1px 0 rgba(79,142,247,.1);
  }
  .header-compact h1 { font-size:16px; font-weight:700; letter-spacing:-.4px; color:var(--t1); }
  .header-compact p  { font-size:10px; color:var(--t3); margin-top:2px; }

  .pro-hero {
    background:linear-gradient(145deg,#12121e 0%,#0d1020 40%,#101828 100%);
    border:1px solid rgba(79,142,247,.15); border-radius:var(--r1); padding:24px 22px;
    position:relative; overflow:hidden;
    box-shadow:0 0 0 1px rgba(79,142,247,.08),0 8px 32px rgba(0,0,0,.5);
    margin-bottom:16px;
  }
  .pro-hero::before {
    content:''; position:absolute; top:-60px; right:-40px; width:220px; height:220px;
    background:radial-gradient(circle,rgba(79,142,247,.1) 0%,transparent 65%);
    pointer-events:none;
  }
  .pro-hero::after {
    content:''; position:absolute; bottom:-40px; left:-30px; width:160px; height:160px;
    background:radial-gradient(circle,rgba(34,197,94,.06) 0%,transparent 65%);
    pointer-events:none;
  }
  .revenue-ticker {
    font-family:"IBM Plex Mono",monospace; font-size:38px; font-weight:700;
    letter-spacing:-2px; line-height:1; color:var(--t1);
    animation:countUp .6s cubic-bezier(.4,0,.2,1) both;
  }
  .revenue-ticker .currency { font-size:22px; color:var(--t2); font-weight:600; }
  .progress-ring { position:relative; display:inline-flex; align-items:center; justify-content:center; }
  .progress-ring svg { transform:rotate(-90deg); }
  .progress-ring-bg   { fill:none; stroke:var(--s4); }
  .progress-ring-fill { fill:none; stroke-linecap:round; transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1); filter:drop-shadow(0 0 6px currentColor); }
  .progress-ring-label { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }

  .section-label {
    font-size:11px; font-weight:800; text-transform:uppercase;
    letter-spacing:1.8px; color:var(--t3); margin:32px 0 12px;
  }
  .section-label:first-child { margin-top:0; }

  .card { background:var(--s1); border-radius:var(--r1); overflow:hidden; box-shadow:var(--sh-card); border:1px solid var(--border); margin-bottom:12px; }
  .card-pad { padding:18px 20px; }
  .card-row { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:15px 20px; border-bottom:1px solid var(--border2); }
  .card-row:last-child { border-bottom:none; }

  .hero-cta { background:linear-gradient(135deg,#1a1a28 0%,#14141e 100%); border:1px solid rgba(79,142,247,.2); border-radius:var(--r1); padding:20px; box-shadow:var(--sh-hero); margin-bottom:14px; position:relative; overflow:hidden; }
  .hero-cta::before { content:''; position:absolute; top:-40px; right:-40px; width:180px; height:180px; background:radial-gradient(circle,rgba(79,142,247,.12) 0%,transparent 70%); pointer-events:none; }
  .cta-btn { background:linear-gradient(135deg,#ff8c4b 0%,#ff6420 100%); color:#fff; border:none; border-radius:var(--r3); padding:15px 22px; font-size:15px; font-weight:800; letter-spacing:-.2px; box-shadow:var(--sh-cta); transition:opacity .15s,transform .15s; display:flex; align-items:center; gap:8px; justify-content:center; width:100%; }
  .cta-btn:active { opacity:.85; transform:scale(.97); }

  .kpi-grid { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border); border-radius:var(--r1); overflow:hidden; margin-bottom:12px; box-shadow:var(--sh-card); }
  .kpi-grid.three { grid-template-columns:1fr 1fr 1fr; }
  .kpi { background:var(--s1); padding:17px 16px 15px; }
  .kpi-label { font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:var(--t3); margin-bottom:8px; }
  .kpi-value { font-family:"IBM Plex Mono",monospace; font-size:20px; font-weight:700; line-height:1; letter-spacing:-.8px; color:var(--t1); }
  .kpi-value.green { color:var(--green); }
  .kpi-value.red   { color:var(--red); }
  .kpi-value.blue  { color:var(--blue); }
  .kpi-sub { font-size:10px; color:var(--t3); margin-top:6px; font-weight:500; }

  .mini-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--border); border-radius:var(--r1); overflow:hidden; margin-bottom:12px; box-shadow:var(--sh-card); }
  .mini-box { background:var(--s1); padding:15px 8px; text-align:center; }
  .mini-box strong { display:block; font-family:"IBM Plex Mono",monospace; font-size:15px; font-weight:700; color:var(--t1); letter-spacing:-.3px; }
  .mini-box span   { display:block; font-size:8px; color:var(--t3); text-transform:uppercase; letter-spacing:.8px; margin-top:5px; font-weight:700; }

  .goal-track { height:3px; background:var(--s4); border-radius:999px; overflow:hidden; margin:14px 0 8px; }
  .goal-fill  { height:100%; border-radius:999px; transition:width .7s cubic-bezier(.4,0,.2,1); }
  .goal-fill.full { background:var(--green); box-shadow:0 0 8px var(--green); }
  .goal-fill.mid  { background:var(--blue);  box-shadow:0 0 8px var(--blue-glow); }
  .goal-fill.low  { background:var(--amber); }

  .stack { display:grid; gap:10px; }
  .job-row { background:var(--s1); border-radius:var(--r2); padding:15px 17px; display:flex; align-items:flex-start; gap:13px; box-shadow:var(--sh-card); border:1px solid var(--border); transition:transform .15s; }
  .job-row:active { transform:scale(.985); }
  .job-icon  { width:42px; height:42px; border-radius:12px; background:var(--s3); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:20px; }
  .job-main  { flex:1; min-width:0; }
  .job-title { font-size:14px; font-weight:700; color:var(--t1); letter-spacing:-.2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .job-meta  { font-size:11px; color:var(--t3); margin-top:3px; line-height:1.6; }
  .job-right { text-align:right; flex-shrink:0; }

  .pending-banner { background:var(--gold-dim); border:1px solid rgba(200,164,74,.2); border-radius:var(--r2); padding:15px 18px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; }
  .pending-banner-title { font-size:13px; font-weight:700; color:var(--gold); }
  .pending-banner-sub   { font-size:11px; color:rgba(200,164,74,.6); margin-top:3px; font-weight:600; }

  .source-bar           { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border2); }
  .source-bar:last-child { border-bottom:none; }
  .source-bar-track     { flex:1; height:2px; background:var(--s4); border-radius:999px; overflow:hidden; }
  .source-bar-fill      { height:100%; background:var(--blue); border-radius:999px; box-shadow:0 0 6px var(--blue-glow); transition:width .8s cubic-bezier(.4,0,.2,1); }

  .label { font-size:11px; color:var(--t2); font-weight:500; }
  .sub   { font-size:11px; color:var(--t3); font-weight:500; }
  .mono  { font-family:"IBM Plex Mono",monospace; }
  .value { font-family:"IBM Plex Mono",monospace; font-size:14px; font-weight:700; color:var(--t1); }
  .value.big    { font-size:22px; }
  .value.green  { color:var(--green); }
  .value.red    { color:var(--red); }
  .value.orange { color:var(--orange); }
  .sub.green    { color:var(--green);  font-weight:700; }
  .sub.red      { color:var(--red);    font-weight:700; }
  .sub.orange   { color:var(--orange); font-weight:700; }

  .pill { display:inline-block; padding:3px 10px; border-radius:999px; font-size:10px; font-weight:800; line-height:1.5; letter-spacing:.2px; }
  .pill.green  { background:var(--green-dim); color:var(--green); }
  .pill.red    { background:var(--red-dim);   color:var(--red); }
  .pill.orange { background:var(--orange-dim);color:var(--orange); }
  .pill.gray   { background:var(--s3);        color:var(--t2); }
  .pill.blue   { background:var(--blue-dim);  color:var(--blue); }
  .pill.gold   { background:var(--gold-dim);  color:var(--gold); }

  .field { margin-bottom:14px; }
  .field label { display:block; font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:1.2px; color:var(--t2); margin-bottom:8px; }
  .field input,.field select,.field textarea { width:100%; border:1px solid var(--border); background:var(--s3); border-radius:var(--r3); padding:13px 15px; outline:none; transition:border-color .15s,box-shadow .15s; color:var(--t1); }
  .field input:focus,.field select:focus,.field textarea:focus { border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-dim); }
  .field select option { background:var(--s2); color:var(--t1); }
  .field textarea { min-height:72px; resize:vertical; }
  .field-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  .chip-row { display:flex; flex-wrap:wrap; gap:7px; margin-top:2px; }
  .chip { border:1px solid var(--border); background:var(--s3); border-radius:999px; padding:8px 14px; font-size:12px; font-weight:700; color:var(--t2); transition:all .15s; }
  .chip.active { background:var(--blue-dim); color:var(--blue); border-color:rgba(79,142,247,.3); }
  .chip.sm { padding:6px 12px; font-size:11px; }

  .city-input-wrap { position:relative; }
  .city-dropdown   { position:absolute; top:calc(100% + 6px); left:0; right:0; background:var(--s2); border:1px solid var(--border); border-radius:var(--r2); box-shadow:var(--sh-float); z-index:200; max-height:240px; overflow-y:auto; animation:fadeSlideUp .2s ease; }
  .city-option     { padding:13px 16px; font-size:14px; border-bottom:1px solid var(--border2); cursor:pointer; display:flex; align-items:center; gap:8px; color:var(--t1); }
  .city-option:last-child { border-bottom:none; }
  .city-option:active { background:var(--s3); }
  .city-section-head { padding:8px 16px 4px; font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:var(--t3); background:var(--s3); }

  .quote-box { background:linear-gradient(135deg,var(--s2) 0%,#181824 100%); border-radius:var(--r1); padding:18px; margin-bottom:14px; border:1px solid rgba(79,142,247,.15); box-shadow:0 0 0 1px rgba(79,142,247,.06),var(--sh-card); }
  .qq-suggested       { text-align:center; padding:14px 10px 12px; border-bottom:1px solid var(--border2); }
  .qq-suggested-label { font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:1.4px; color:var(--t3); margin-bottom:6px; }
  .qq-suggested-price {
    font-family:"IBM Plex Mono",monospace;
    font-size:48px; font-weight:800; line-height:.95;
    letter-spacing:-2.4px;
    color:var(--t1);
    font-feature-settings:"tnum" 1, "lnum" 1;
    background:linear-gradient(180deg,#fff 0%,#cfd9ff 90%);
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:countUp .4s ease both;
  }
  .qq-dec-badge       { display:inline-flex; align-items:center; gap:5px; padding:5px 14px; border-radius:999px; font-size:11px; font-weight:800; margin-top:10px; }
  .qq-dec-badge.take  { background:var(--green-dim); color:var(--green); }
  .qq-dec-badge.raise { background:var(--amber-dim); color:var(--amber); }
  .qq-dec-badge.low   { background:var(--red-dim);   color:var(--red); }
  .qq-apply-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; padding:12px; }
  .qq-apply-btn { border:none; border-radius:var(--r3); padding:10px 4px; font-size:11px; font-weight:800; cursor:pointer; line-height:1.3; transition:all .15s; }
  .qq-apply-btn:active { opacity:.75; transform:scale(.95); }
  .qq-apply-btn.suggested { background:var(--green-dim); color:var(--green); border:1px solid rgba(34,197,94,.2); }
  .qq-apply-btn.premium   { background:var(--orange-dim);color:var(--orange);border:1px solid rgba(255,125,59,.2); }
  .qq-apply-btn.custom    { background:var(--s3); color:var(--t2); border:1px solid var(--border); }
  .qq-apply-btn.active-sel{ outline:1.5px solid currentColor; outline-offset:2px; }

  .src-grid { display:flex; flex-wrap:wrap; gap:7px; margin-top:4px; }
  .src-btn  { border:1px solid var(--border); background:var(--s3); border-radius:var(--r3); padding:9px 12px; font-size:12px; font-weight:700; color:var(--t2); transition:all .15s; display:flex; align-items:center; gap:5px; }
  .src-btn.active { background:var(--blue-dim); color:var(--blue); border-color:rgba(79,142,247,.3); }
  .pay-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:4px; }
  .pay-btn  { border:1px solid var(--border); border-radius:var(--r2); padding:11px 4px; background:var(--s3); display:flex; flex-direction:column; align-items:center; gap:4px; font-size:11px; font-weight:700; color:var(--t2); transition:all .15s; }
  .pay-btn.active { background:var(--blue-dim); color:var(--blue); border-color:rgba(79,142,247,.3); }
  .pay-btn .pay-icon { font-size:18px; }

  .sticky-save {
    position:sticky; bottom:0; left:0; right:0;
    background:var(--bg); border-top:1px solid var(--border);
    padding:13px 16px; padding-bottom:calc(13px + env(safe-area-inset-bottom));
    display:grid; grid-template-columns:1fr 1fr; gap:10px;
    z-index:50; box-shadow:0 -8px 32px rgba(0,0,0,.6);
  }

  .btn { border:none; border-radius:var(--r3); padding:15px 18px; font-weight:700; font-size:14px; transition:all .15s; letter-spacing:-.1px; }
  .btn:active { opacity:.8; transform:scale(.97); }
  .btn.primary   { background:linear-gradient(135deg,#5a97ff,#3d7ef5); color:#fff; box-shadow:0 4px 16px rgba(79,142,247,.3); }
  .btn.secondary { background:var(--s3); color:var(--t2); border:1px solid var(--border); }
  .btn.sm  { padding:9px 14px; font-size:12px; border-radius:var(--r4); }
  .btn.xs  { padding:6px 10px; font-size:11px; border-radius:7px; font-weight:700; }
  .btn.danger  { background:var(--red-dim);    color:var(--red); }
  .btn.success { background:var(--green-dim);  color:var(--green); }
  .btn.blue    { background:var(--blue-dim);   color:var(--blue); }
  .btn.orange  { background:var(--orange-dim); color:var(--orange); }
  .btn.gold    { background:var(--gold-dim);   color:var(--gold); }

  .form-group { background:var(--s1); border-radius:var(--r1); padding:16px 18px; margin-bottom:10px; box-shadow:var(--sh-card); border:1px solid var(--border); }
  .form-group-title { font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:1.4px; color:var(--t2); margin-bottom:14px; }

  .success-strip { background:var(--green-dim); border:1px solid rgba(34,197,94,.2); border-radius:var(--r2); padding:14px 16px; margin-bottom:14px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; animation:scaleIn .3s ease; }
  .success-strip-title { font-size:12px; font-weight:700; color:var(--green); width:100%; margin-bottom:4px; }

  .bottom-nav { display:flex; background:linear-gradient(180deg,#0f0f17 0%,#0a0a0f 100%); border-top:1px solid var(--border); padding-bottom:env(safe-area-inset-bottom); flex-shrink:0; box-shadow:0 -4px 20px rgba(0,0,0,.5),0 -1px 0 rgba(79,142,247,.08); }
  .nav-btn { flex:1; border:none; background:none; padding:10px 2px 9px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:var(--t3); font-size:7.5px; font-weight:800; text-transform:uppercase; letter-spacing:.6px; position:relative; transition:color .15s; }
  .nav-btn.active { color:var(--blue); }
  .nav-btn.active::after { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:24px; height:2px; background:linear-gradient(90deg,var(--blue),#7ab4ff); border-radius:0 0 4px 4px; box-shadow:0 0 8px var(--blue-glow); }
  .nav-btn .ico { font-size:19px; line-height:1; transition:transform .15s; }
  .nav-btn.active .ico { transform:scale(1.1); filter:drop-shadow(0 0 4px var(--blue-glow)); }
  .nav-btn[data-id="add"] { color:var(--t2); }

// ── Tire size normalization ──────────────────────────────────────────────────
function normalizeTireSize(s) {
  if (!s) return "";
  const m = String(s).match(/(\d{3})\s*[\/\-\s]+\s*(\d{2,3})\s*[\/\-\s]*\s*R?\s*(\d{2})/i);
  if (!m) return "";
  return m[1] + "/" + m[2] + "R" + m[3];
}

function planInventoryDeduction(inventory, tireSize, qtyNeeded, preferredId) {
  const targetSize = normalizeTireSize(tireSize);
  if (!targetSize || !qtyNeeded || qtyNeeded <= 0) return null;

  const candidates = (inventory || [])
    .filter(i => normalizeTireSize(i.size) === targetSize && (Number(i.qty) || 0) > 0);

  if (candidates.length === 0) return null;

  const sorted = candidates.slice().sort((a, b) => {
    const ac = (String(a.condition||"new").toLowerCase() === "new") ? 0 : 1;
    const bc = (String(b.condition||"new").toLowerCase() === "new") ? 0 : 1;
    if (ac !== bc) return ac - bc;
    return (Number(b.qty) || 0) - (Number(a.qty) || 0);
  });

  const ordered = preferredId
    ? [
        ...sorted.filter(r => String(r.id) === String(preferredId)),
        ...sorted.filter(r => String(r.id) !== String(preferredId)),
      ]
    : sorted;

  const plan = [];
  let remaining = qtyNeeded;
  for (const row of ordered) {
    if (remaining <= 0) break;
    const have = Number(row.qty) || 0;
    const take = Math.min(have, remaining);
    plan.push({
      id: String(row.id),
      size: String(row.size || ""),
      condition: String(row.condition || "New"),
      before: have,
      deducted: take,
      after: have - take,
    });
    remaining -= take;
  }

  return { plan, totalDeducted: qtyNeeded - remaining, shortfall: remaining };
}

function applyInventoryDeduction(plan, setInventory) {
  if (!plan || !Array.isArray(plan.plan) || plan.plan.length === 0) return;
  const byId = {};
  plan.plan.forEach(step => { byId[step.id] = step.after; });
  setInventory(prev => {
    const arr = Array.isArray(prev) ? prev : [];
    return arr.map(i => byId[i.id] !== undefined ? {...i, qty: byId[i.id]} : i);
  });
}

function restoreInventoryDeduction(deductions, setInventory) {
  if (!Array.isArray(deductions) || deductions.length === 0) return;
  const addMap = {};
  deductions.forEach(d => { addMap[d.id] = (addMap[d.id] || 0) + (Number(d.deducted) || 0); });
  setInventory(prev => {
    const arr = Array.isArray(prev) ? prev : [];
    return arr.map(i => addMap[i.id] ? {...i, qty: (Number(i.qty)||0) + addMap[i.id]} : i);
  });
}

const TODAY    = () => new Date().toLocaleDateString("en-CA", {timeZone:"America/New_York"});
const NOW_HHMM = () => {
  const d = new Date();
  const f = new Intl.DateTimeFormat("en-US", { timeZone:"America/New_York", hour12:false, hour:"2-digit", minute:"2-digit" });
  return f.format(d).replace(/^24/, "00");
};
const fmtTime = (hhmm) => {
  if (!hhmm || typeof hhmm !== "string") return "";
  const m = hhmm.match(/^(\d{1,2}):(\d{2})/);
  if (!m) return "";
  let h = Number(m[1]); const mins = m[2];
  const ap = h >= 12 ? "PM" : "AM";
  h = h % 12; if (h === 0) h = 12;
  return h + ":" + mins + " " + ap;
};

const haptic = (ms = 10) => { try { if (navigator.vibrate) navigator.vibrate(ms); } catch(e) {} };

function useCountUp(target, durationMs = 700) {
  const [value, setValue] = useState(0);
  const startedRef = useRef(false);
  useEffect(() => {
    if (startedRef.current) {
      setValue(target);
      return;
    }
    startedRef.current = true;
    const t0 = performance.now();
    let raf = 0;
    const tick = (now) => {
      const elapsed = now - t0;
      const p = Math.min(1, elapsed / durationMs);
      const eased = 1 - Math.pow(1 - p, 3);
      setValue(target * eased);
      if (p < 1) raf = requestAnimationFrame(tick);
      else setValue(target);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target]);
  return value;
}
const uid      = () => (typeof crypto !== "undefined" && crypto.randomUUID)
  ? crypto.randomUUID().replace(/-/g,"").slice(0,16)
  : Date.now().toString(36) + Math.random().toString(36).slice(2,10);
const r2       = n  => Math.round((Number(n||0) + Number.EPSILON) * 100) / 100;
const money    = n  => new Intl.NumberFormat("en-US", {style:"currency", currency:"USD"}).format(Number(n||0));
const clamp    = (n,lo,hi) => Math.min(hi, Math.max(lo, n));

const jobDirectCost  = (j,s) => r2(Number(j.miles||0)*Number(s.costPerMile||0.65)+Number(j.tireCost||0)+Number(j.miscCost||0));

const INSTALL_FLAT_PRICING = {1:90, 2:140, 3:190, 4:220};
const installFlatTotal = qty => {
  const n = Number(qty);
  const q = (Number.isFinite(n) && n >= 1) ? Math.floor(n) : 1;
  if (INSTALL_FLAT_PRICING[q]) return INSTALL_FLAT_PRICING[q];
  return INSTALL_FLAT_PRICING[4] + (q - 4) * 30;
};

const REPLACEMENT_TIER_PRICING = {1:120, 2:220, 3:320, 4:400};
const replacementTierTotal = qty => {
  const n = Number(qty);
  const q = (Number.isFinite(n) && n >= 1) ? Math.floor(n) : 1;
  if (REPLACEMENT_TIER_PRICING[q]) return REPLACEMENT_TIER_PRICING[q];
  return REPLACEMENT_TIER_PRICING[4] + (q - 4) * 100;
};

const isWeSupplyTireJob = j => {
  if (!j) return false;

};

const isCustomerSuppliedInstall = j =>

function distancePremium(miles) {
  const m = Number(miles||0);
  if (m <= 10) return 0;
  if (m <= 25) return 15;
  return 35;
}

function premiums(j) {
  if (!j) return 0;
  let p = 0;
  if (j.emergency) p += 20;
  if (j.lateNight) p += 20;
  if (j.highway)   p += 15;
  if (j.weekend)   p += 10;
  if (j.difficulty === "medium") p += 15;
  if (j.difficulty === "high")   p += 30;
  return p;
}

function getServicePricing(service, s) {
  const sp = (s && s.servicePricing) || DEFAULT_SERVICE_PRICING;
  return sp[service] || DEFAULT_SERVICE_PRICING[service] || {enabled:true, basePrice:90, minProfit:60};
}
function getVehicleAddOn(vehicleType, s) {
  const vp = (s && s.vehiclePricing) || DEFAULT_VEHICLE_PRICING;
  const v  = vp[vehicleType] || DEFAULT_VEHICLE_PRICING[vehicleType] || {addOnProfit:0};
  return Number(v.addOnProfit || 0);
}

function calculateJobPricing(job, settings) {
  const s = settings || {};
  const j = job || {};
  const costPerMile = Math.max(0, Number(s.costPerMile || 0.65));

  const miles       = Math.max(0, Number(j.miles || 0));
  const qty         = Math.max(1, Number(j.qty || 1));
  const tireCost    = isCustomerSuppliedInstall(j)
    ? 0
    : Math.max(0, Number(j.tireCost || 0)) * qty;
  const miscCost    = Math.max(0, Number(j.miscCost || 0));
  const trivialDistance = miles <= 1;
  const travelCost  = trivialDistance ? 0 : r2(miles * costPerMile);
  const directCost  = r2(tireCost + miscCost + travelCost);
  const revenue     = Math.max(0, Number(j.revenue || 0));
  const actualProfit= r2(revenue - directCost);

  const svcRule    = getServicePricing(j.service, s);
  const vehicleAdd = Math.max(0, getVehicleAddOn(j.vehicleType, s));
  const baseTarget = (svcRule && svcRule.minProfit != null && !isNaN(Number(svcRule.minProfit)))
    ? Number(svcRule.minProfit)
    : Number(s.defaultTargetProfit || 100);

  const isFlatInstall = isCustomerSuppliedInstall(j);
  const isWeSupply    = isWeSupplyTireJob(j);

  let targetProfit;
  if (isFlatInstall) {
    targetProfit = installFlatTotal(qty) + vehicleAdd;
  } else if (isWeSupply) {
    targetProfit = replacementTierTotal(qty) + vehicleAdd;
  } else {
    targetProfit = baseTarget + vehicleAdd;
  }

  const distanceAdj   = distancePremium(miles);
  const urgencyBase   = premiums(j);
  const urgencyPremium= urgencyBase + distanceAdj;

  const raw = directCost + targetProfit + urgencyPremium;
  const suggestedPrice = Math.ceil(raw / 5) * 5;

  const premiumPrice = Math.ceil((suggestedPrice + 20) / 5) * 5;

  const skip = Number(s.skipThreshold || 70);
  let decisionLabel = "Take it";
  let decisionType  = "take";
  if (isTireMaterialService(j.service) && (j.tireSource === "Bought for this job") && tireCost <= 0) {
    decisionLabel = "Missing tire cost";
    decisionType  = "missing";
  } else if (revenue > 0 && actualProfit < skip) {
    decisionLabel = "Low margin — increase price";
    decisionType  = "low";
  } else if (distanceAdj >= 35) {
    decisionLabel = "High distance — premium applied";
    decisionType  = "distance";
  } else if (revenue > 0 && actualProfit >= skip + 40) {
    decisionLabel = "Strong profit — take it";
    decisionType  = "strong";
  } else if (revenue === 0) {
    decisionLabel = "Estimated price";
    decisionType  = "estimate";
  }

  return {
    revenue, tireCost, miscCost, travelCost, directCost,
    targetProfit, urgencyPremium, distanceAdj, baseTarget, vehicleAdd,
    suggestedPrice, premiumPrice, actualProfit,
    decisionLabel, decisionType,
  };
}

function suggestedPrice(j, s) {
  return calculateJobPricing(j, s).suggestedPrice;

function getWeekStart(d) {
  const dt = new Date(d+"T12:00:00"), day = dt.getDay();
  dt.setDate(dt.getDate()-(day>=5?day-5:day+2));
  return dt.toLocaleDateString("en-CA",{timeZone:"America/New_York"});
}
function weekLabel(s) {
  const d = new Date(s+"T12:00:00"), e = new Date(d);
  e.setDate(e.getDate()+6);
  const f = dt => dt.toLocaleDateString("en-US",{timeZone:"America/New_York",month:"short",day:"numeric"});
  return f(d)+" – "+f(e)+", "+e.toLocaleDateString("en-US",{timeZone:"America/New_York",year:"numeric"}).split("/")[2];
}
function nextFriday() {
  const now = new Date();
  const dayStr = now.toLocaleDateString("en-US",{timeZone:"America/New_York",weekday:"short"});
  const dm = {Sun:0,Mon:1,Tue:2,Wed:3,Thu:4,Fri:5,Sat:6};
  const day = dm[dayStr.slice(0,3)];
  const offset = day === 5 ? 7 : ((5 - day + 7) % 7);
  const fri = new Date(now); fri.setDate(fri.getDate() + offset);
  return fri.toLocaleDateString("en-US",{timeZone:"America/New_York",weekday:"short",month:"short",day:"numeric"});
}
function groupByWeek(jobs) {
  const map = {};
  [...(jobs||[])].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id))
    .forEach(j => { const k=getWeekStart(j.date); if(!map[k]) map[k]=[]; map[k].push(j); });
  return Object.entries(map).sort((a,b)=>b[0].localeCompare(a[0]));
}
const getMonthKey = d => String(d||"").slice(0,7);
function monthLabel(key) {
  const [y,m] = String(key||"").split("-");
  if (!y || !m) return key || "";
  const dt = new Date(Number(y), Number(m)-1, 1);
  return dt.toLocaleDateString("en-US",{timeZone:"America/New_York",month:"long",year:"numeric"});
}
function groupByMonth(jobs) {
  const map = {};
  [...(jobs||[])].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id))
    .forEach(j => { const k=getMonthKey(j.date); if(!k) return; if(!map[k]) map[k]=[]; map[k].push(j); });
  return Object.entries(map).sort((a,b)=>b[0].localeCompare(a[0]));
}
function weekSummary(weekJobs,s) {
  const jobs = Array.isArray(weekJobs)?weekJobs:[];
  const revenue     = r2(jobs.reduce((t,j)=>t+Number(j.revenue||0),0));
  const directCosts = r2(jobs.reduce((t,j)=>t+jobDirectCost(j,s),0));
  const grossProfit = r2(revenue-directCosts);
  return {revenue,directCosts,grossProfit,net:grossProfit,fixed:0};
}

function monthSummary(monthJobs,s) {
  const jobs = Array.isArray(monthJobs)?monthJobs:[];
  const revenue     = r2(jobs.reduce((t,j)=>t+Number(j.revenue||0),0));
  const tireCosts   = r2(jobs.reduce((t,j)=>t+Number(j.tireCost||0),0));
  const miscCosts   = r2(jobs.reduce((t,j)=>t+Number(j.miscCost||0),0));
  const travelCosts = r2(jobs.reduce((t,j)=>t+Number(j.miles||0)*Number(s.costPerMile||0.65),0));
  const directCosts = r2(tireCosts+miscCosts+travelCosts);
  const grossProfit = r2(revenue-directCosts);
  const fixed       = monthlyFixed(s);
  const net         = r2(grossProfit-fixed);
  return {revenue,tireCosts,miscCosts,travelCosts,directCosts,grossProfit,fixed,net};
}
function dedupeInventory(items) {
  const seen = {};
  (items||[]).filter(i=>(i.size||"").trim()).forEach(i => {
    const cond = (String(i.condition||"").toLowerCase() === "used") ? "used" : "new";
    const key = i.size.toLowerCase().replace(/\s+/g,"") + "|" + cond;
    if (!seen[key]) {
      seen[key] = {...i, qty: Number(i.qty||0)};
    } else {
      seen[key].qty += Number(i.qty||0);
      if (!seen[key].cost && i.cost) seen[key].cost = i.cost;
    }
  });
  return Object.values(seen);
}
function sanitizeJob(j) {
  if (j === null || j === undefined || typeof j !== "object") j = {};
  const src = String(j.tireSource||"Inventory");
  const validSrc = ["Inventory","Bought for this job","Customer supplied"].includes(src) ? src : "Inventory";

  let inventoryDeductions = j.inventoryDeductions;
  if (typeof inventoryDeductions === "string") {
    try { inventoryDeductions = JSON.parse(inventoryDeductions); } catch { inventoryDeductions = null; }
  }
  if (!Array.isArray(inventoryDeductions)) inventoryDeductions = null;

  let inventoryUsed = j.inventoryUsed;
  if (typeof inventoryUsed === "string") {
    try { inventoryUsed = JSON.parse(inventoryUsed); } catch { inventoryUsed = null; }
  }
  if (!inventoryUsed || typeof inventoryUsed !== "object") inventoryUsed = null;

  return {
    id: String(j.id||uid()), date: String(j.date||TODAY()), startTime: String(j.startTime||""), service: String(j.service||"Flat Tire Repair"),
    vehicleType: String(j.vehicleType||"Car"),

    miscCost: Number(j.miscCost||0), miles: Number(j.miles||0), note: String(j.note||""),
    emergency: !!j.emergency, lateNight: !!j.lateNight, highway: !!j.highway, weekend: !!j.weekend,

    tireBrand: String(j.tireBrand||""),
    tireModel: String(j.tireModel||""),

function migrateOldJobs() {

  const OLD=["wr-jobs-v5","wr-upgraded-jobs-v1","wr2-jobs-v1","wr2-jobs-v2","wheelrush_jobs"];

// ── Error Boundary ────────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {crashed:false, error:null}; }
  static getDerivedStateFromError(error) { return {crashed:true, error}; }
  componentDidCatch(error, info) { console.error("N&K On Time crash:", error, info); }
  render() {
    if (this.state.crashed) {
      return React.createElement("div", {
        style:{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",
               justifyContent:"center",background:"#0a0a0f",padding:"32px",gap:16}
      },
        React.createElement("div",{style:{fontSize:40}},"⚠️"),
        React.createElement("div",{style:{color:"#f0f0fa",fontSize:18,fontWeight:700,textAlign:"center"}},"Something went wrong"),
        React.createElement("div",{style:{color:"#8888a8",fontSize:13,textAlign:"center",lineHeight:1.6,maxWidth:280}},
          "The app hit an error. Tap to recover."),
        React.createElement("div",{style:{color:"#44445a",fontSize:11,textAlign:"center",fontFamily:"monospace",maxWidth:320,wordBreak:"break-all",marginTop:4}},
          String(this.state.error||"").slice(0,140)),
        React.createElement("button",{
          onClick:()=>this.setState({crashed:false,error:null}),
          style:{background:"linear-gradient(135deg,#5a97ff,#3d7ef5)",color:"#fff",
                 border:"none",borderRadius:12,padding:"14px 28px",fontSize:15,
                 fontWeight:700,cursor:"pointer",marginTop:8}
        },"Reload App")
      );
    }
    return this.props.children;
  }
}

// ── Progress Ring ─────────────────────────────────────────────────────────────
function ProgressRing({size,stroke,pct,color,children}) {
  const radius = (size-stroke)/2;
  const circ = 2*Math.PI*radius;
  const offset = circ - (clamp(pct,0,100)/100)*circ;
  return html`<div class="progress-ring" style=${{width:size,height:size}}>
    <svg width=${size} height=${size}>
      <circle class="progress-ring-bg" cx=${size/2} cy=${size/2} r=${radius} strokeWidth=${stroke}/>
      <circle class="progress-ring-fill" cx=${size/2} cy=${size/2} r=${radius} strokeWidth=${stroke}
        stroke=${color} style=${{strokeDasharray:circ,strokeDashoffset:offset,color}}/>
    </svg>
    <div class="progress-ring-label">${children}</div>
  </div>`;
}

function QuickQuote({form,settings,onApply,onFormChange,priceMode,setPriceMode}) {
  const customRef=useRef(null);
  const isTierPriced = isCustomerSuppliedInstall(form) || isWeSupplyTireJob(form);
  const hasInputs = isTierPriced
    || Number(form.miles||0)>0
    || Number(form.tireCost||0)>0
    || Number(form.miscCost||0)>0;

  const calc = calculateJobPricing(form, settings);
  const { directCost, suggestedPrice:suggested, premiumPrice, urgencyPremium:prem,
          travelCost, tireCost, miscCost, distanceAdj, vehicleAdd,
          baseTarget, targetProfit, decisionLabel, decisionType } = calc;

  const skip = Number(settings.skipThreshold||70);
  const dispPrice = priceMode==="custom" ? Number(form.revenue||0)
                  : priceMode==="premium" ? premiumPrice
                  : suggested;
  const profit = r2(dispPrice - directCost);

  const liveDec = priceMode==="custom" && Number(form.revenue||0)>0
    ? (profit < 0 ? {label:"⚠ Loss — you'd lose " + money(Math.abs(profit)), type:"loss"}
      : profit<skip ? {label:"Low margin — increase price", type:"low"}
      : profit>=skip+40 ? {label:"Strong profit — take it", type:"strong"}
      : {label:"Take it", type:"take"})

    ${!hasInputs?html`<div style=${{textAlign:"center",padding:"8px 0"}}>
      <div style=${{fontSize:13,color:"var(--t2)",fontWeight:600}}>Enter job details above</div>
      <div style=${{fontSize:11,color:"var(--t3)",marginTop:4}}>Miles · Tire cost · Misc → auto-calculates</div>
    </div>`:html`<div>
      <div class="qq-suggested">
        <div class="qq-suggested-label">${priceMode==="custom"?"Custom Price":priceMode==="premium"?"Premium Price":"Suggested Price"}</div>

          <div style=${{textAlign:"center"}}><div style=${{fontSize:10,color:"var(--t3)",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",marginBottom:2}}>Cost</div><div style=${{fontFamily:'"IBM Plex Mono",monospace',fontSize:15,fontWeight:700,color:"var(--t2)"}}>${money(directCost)}</div></div>

      ${priceMode==="custom"&&html`<div style=${{padding:"10px 10px 4px"}}>

        <div style=${{fontSize:10,color:"var(--t3)",textAlign:"center",marginTop:5}}>Profit: ${money(r2(Number(form.revenue||0)-directCost))}</div>
      </div>`}
    </div>`}
  </div>`;

// ── CallCounter ──────────────────────────────────────────────────────────────
function CallCounter({jobsToday}) {
  const today = TODAY();
  const [calls, setCalls] = useState(() => {
    const data = load(KEYS.calls, {});
    return Number(data[today] || 0);
  });
  const [autoFlash, setAutoFlash] = useState(false);
  useEffect(() => {
    const handler = () => {
      const data = load(KEYS.calls, {});
      const next = Number(data[today] || 0);
      setCalls(prev => {
        if (next > prev) {
          setAutoFlash(true);
          setTimeout(() => setAutoFlash(false), 700);
        }
        return next;
      });
    };
    window.addEventListener("nk-calls-updated", handler);
    return () => window.removeEventListener("nk-calls-updated", handler);
  }, [today]);
  const update = (delta) => {
    const next = Math.max(0, calls + delta);
    setCalls(next);
    const data = load(KEYS.calls, {});
    data[today] = next;
    persist(KEYS.calls, data);
  };
  const showRate = calls > 0 ? Math.round((jobsToday / calls) * 100) : 0;
  return html`<div class="card card-anim" style=${{marginBottom:14,padding:"12px 14px"}}>
    <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div>
        <div style=${{fontSize:9,fontWeight:800,textTransform:"uppercase",letterSpacing:"1.4px",color:"var(--t3)"}}>Today's Calls</div>
        <div style=${{fontSize:11,color:"var(--t3)",marginTop:2,fontFamily:'"IBM Plex Mono",monospace'}}>${calls} call${calls===1?"":"s"} · ${jobsToday} booked${calls>0?" · "+showRate+"% show":""}</div>
      </div>
      <div style=${{display:"flex",alignItems:"center",gap:6}}>
        <button class="press-scale" onClick=${()=>update(-1)} disabled=${calls===0} style=${{width:34,height:34,borderRadius:8,border:"1px solid var(--border)",background:"var(--card)",color:calls===0?"var(--t3)":"var(--t1)",fontSize:16,fontWeight:700,cursor:calls===0?"default":"pointer",opacity:calls===0?0.4:1}}>−</button>
        <div style=${{minWidth:32,textAlign:"center",fontFamily:'"IBM Plex Mono",monospace',fontSize:18,fontWeight:800,color:autoFlash?"var(--green)":"var(--t1)",transform:autoFlash?"scale(1.15)":"scale(1)",transition:"all .25s cubic-bezier(.34,1.56,.64,1)"}}>${calls}</div>
        <button class="press-scale" onClick=${()=>update(1)} style=${{width:34,height:34,borderRadius:8,border:"1px solid var(--blue)",background:"var(--blue)",color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer"}}>+</button>
      </div>
    </div>
  </div>`;
}

        const msg = "N & K On Time · "+weekLabel(thisWeek)+"\\n"+
          weekJobs.length+" jobs · "+money(totals.revenue)+" rev · "+money(totals.grossProfit)+" profit"+
          (topSvc?"\\nTop: "+topSvc:"");
        try {
          if (navigator.share) {
            await navigator.share({text:msg});
          } else if (navigator.clipboard) {
            await navigator.clipboard.writeText(msg);
            if (window.toast) window.toast("Copied to clipboard","success");
          }
        } catch(e) {}
      }} style=${{background:"var(--s2)",border:"1px solid var(--border)",color:"var(--t1)",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>↗ Share Week</button>`}

      const profit=jobGrossProfit(job,settings);
      const pg=profit>=70,po=profit>=40&&profit<70;

// ── AddJob ──────────────────────────────────────────────────────────────────
function AddJob({form,setForm,onSave,settings,recentSizes,inventory,toast}) {
  const [priceMode,setPriceMode]=useState("suggested");
  const change=(k,v)=>setForm(p=>({...p,[k]:v}));
  const calc=calculateJobPricing(form,settings);

  const handleSave=()=>{
    if(!form.service){ toast&&toast("Pick a service first","err"); return; }
    const finalPrice = priceMode==="custom" ? Number(form.revenue||0)
      : priceMode==="premium" ? calc.premiumPrice
      : calc.suggestedPrice;
    if(!finalPrice||finalPrice<=0){ toast&&toast("Set a price","err"); return; }

    const job=sanitizeJob({
      ...form,
      id:form.id||uid(),
      revenue:finalPrice,
      date:form.date||TODAY(),
      startTime:form.startTime||NOW_HHMM(),
    });

    if(isTireMaterialService(job.service) && job.tireSource==="Inventory" && job.tireSize){
      const plan=planInventoryDeduction(inventory,job.tireSize,Number(job.qty||1),job.inventoryItemId);
      if(plan){
        job.inventoryDeductions=plan.plan;
        job.inventoryShortfall=plan.shortfall;
        job.inventoryDeducted=true;
      }
    }
    onSave(job);
    setForm(EMPTY_JOB());
    setPriceMode("suggested");
    haptic(15);
    toast&&toast("Job saved","ok");
  };

  useEffect(()=>{
    if(priceMode==="suggested") change("revenue",calc.suggestedPrice);
    else if(priceMode==="premium") change("revenue",calc.premiumPrice);

  },[priceMode,form.service,form.qty,form.miles,form.tireCost,form.miscCost,form.tireSource,form.vehicleType]);

  const inp={width:"100%",border:"1px solid var(--border)",background:"var(--s3)",color:"var(--t1)",borderRadius:"var(--r3)",padding:"12px 14px",outline:"none",fontSize:15};

          ${SERVICE_OPTIONS.map(s=>html`<option key=${s} value=${s}>${s}</option>`)}
        </select>
      </div>
      <div><label style=${lbl}>Vehicle</label>
        <div class="chip-row">
          ${VEHICLE_TYPES.map(v=>html`<button key=${v} type="button" class=${"chip"+(form.vehicleType===v?" active":"")} onClick=${()=>change("vehicleType",v)}>${v}</button>`)}

          <input type="date" value=${form.date||""} onChange=${e=>change("date",e.target.value)} style=${inp}/>
          <input type="time" value=${form.startTime||""} onChange=${e=>change("startTime",e.target.value)} style=${inp}/>
        </div>
      </div>
      <div><label style=${lbl}>Service area</label>
        <${CityInput} value=${form.area||""} onChange=${v=>change("area",v)}/>
      </div>
    </div>

    ${isTireMaterialService(form.service)&&html`<div class="card card-pad stack">
      <div><label style=${lbl}>Tire size</label>
        <input type="text" placeholder="e.g. 225/65R17" value=${form.tireSize||""} onChange=${e=>change("tireSize",e.target.value)} style=${inp}/>
        ${recentSizes&&recentSizes.length>0&&html`<div class="chip-row" style=${{marginTop:8}}>
          ${recentSizes.slice(0,8).map(s=>html`<button key=${s} type="button" class=${"chip sm"+(form.tireSize===s?" active":"")} onClick=${()=>change("tireSize",s)}>${s}</button>`)}

      </div>
      <div><label style=${lbl}>Tire source</label>

          <div style=${{color:"var(--t2)"}}>Direct costs</div><div style=${{textAlign:"right",fontFamily:'"IBM Plex Mono",monospace',color:"var(--t3)"}}>−${money(sum.directCosts)}</div>
          <div style=${{color:"var(--t2)"}}>Weekly fixed</div><div style=${{textAlign:"right",fontFamily:'"IBM Plex Mono",monospace',color:"var(--t3)"}}>−${money(fixed)}</div>
          <div style=${{fontWeight:700,paddingTop:6,borderTop:"1px solid var(--border)",color:"var(--t1)"}}>Net</div>
          <div style=${{textAlign:"right",fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,paddingTop:6,borderTop:"1px solid var(--border)",color:net>=0?"var(--green)":"var(--red)"}}>${money(net)}</div>
        </div>
        ${(settings.owner1Active!==false||settings.owner2Active!==false)&&html`<div style=${{display:"grid",gridTemplateColumns:"1fr auto",gap:8,padding:"10px 12px",background:"var(--s3)",borderRadius:8,fontSize:13}}>
          ${settings.owner1Active!==false&&html`<div style=${{color:"var(--t2)"}}>${settings.owner1Name||"Owner 1"}</div>
          <div style=${{textAlign:"right",fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,color:"var(--green)"}}>${money(o1)}</div>`}
          ${settings.owner2Active!==false&&html`<div style=${{color:"var(--t2)"}}>${settings.owner2Name||"Owner 2"}</div>
          <div style=${{textAlign:"right",fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,color:"var(--green)"}}>${money(o2)}</div>`}
        </div>`}
      </div>`;
    })}
  </div></div>`;
}

// ── Inventory ───────────────────────────────────────────────────────────────
function Inventory({inventory,setInventory,toast}) {
  const [size,setSize]=useState("");
  const [brand,setBrand]=useState("");
  const [condition,setCondition]=useState("New");
  const [qty,setQty]=useState("");
  const [cost,setCost]=useState("");
  const [filter,setFilter]=useState("");
  const [compact,setCompact]=useState(()=>load("nk_inv_compact",false));

  useEffect(()=>persist("nk_inv_compact",compact),[compact]);

  const totalUnits=inventory.reduce((t,i)=>t+Number(i.qty||0),0);
  const totalValue=inventory.reduce((t,i)=>t+Number(i.qty||0)*Number(i.cost||0),0);

  const add=()=>{
    if(!size.trim()){ toast&&toast("Tire size required","err"); return; }
    const norm=normalizeTireSize(size)||size.trim();
    setInventory(prev=>{
      const arr=Array.isArray(prev)?prev.slice():[];
      const matchIdx=arr.findIndex(i=>normalizeTireSize(i.size)===normalizeTireSize(norm) && (i.condition||"New").toLowerCase()===condition.toLowerCase());
      if(matchIdx>=0){
        arr[matchIdx]={...arr[matchIdx], qty:Number(arr[matchIdx].qty||0)+Number(qty||1), cost:Number(cost||arr[matchIdx].cost||0)};
      } else {
        arr.push(sanitizeInvItem({id:uid(),size:norm,brand,condition,qty:Number(qty||1),cost:Number(cost||0)}));
      }
      return arr;
    });
    setSize(""); setBrand(""); setQty(""); setCost("");
    haptic(10); toast&&toast("Added to inventory","ok");
  };

  const adjustQty=(id,delta)=>{
    setInventory(prev=>(Array.isArray(prev)?prev:[]).map(i=>i.id===id?{...i,qty:Math.max(0,Number(i.qty||0)+delta)}:i));
  };
  const del=id=>setInventory(prev=>(Array.isArray(prev)?prev:[]).filter(i=>i.id!==id));

  const filtered=inventory.filter(i=>{
    if(!filter.trim()) return true;
    const q=filter.toLowerCase();
    return (i.size||"").toLowerCase().includes(q)||(i.brand||"").toLowerCase().includes(q);
  }).sort((a,b)=>(a.size||"").localeCompare(b.size||""));

  const inp={width:"100%",border:"1px solid var(--border)",background:"var(--s3)",color:"var(--t1)",borderRadius:"var(--r3)",padding:"12px 14px",outline:"none",fontSize:15};
  const lbl={fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",color:"var(--t2)",marginBottom:6,display:"block"};

  return html`<div class="screen"><div class="page page-enter">
    <div class="section-label">Inventory</div>

    <div class="card card-pad stack">
      <div style=${{display:"grid",gridTemplateColumns:"2fr 1fr",gap:8}}>
        <div><label style=${lbl}>Tire size</label>
          <input type="text" value=${size} onChange=${e=>setSize(e.target.value)} placeholder="225/65R17" style=${inp}/>
        </div>
        <div><label style=${lbl}>Condition</label>
          <select value=${condition} onChange=${e=>setCondition(e.target.value)} style=${inp}>
            <option>New</option><option>Used</option>
          </select>
        </div>
      </div>
      <div><label style=${lbl}>Brand (optional)</label>
        <input type="text" value=${brand} onChange=${e=>setBrand(e.target.value)} style=${inp}/>
      </div>
      <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <div><label style=${lbl}>Quantity</label>
          <input type="number" min="1" inputMode="numeric" value=${qty} onChange=${e=>setQty(e.target.value)} placeholder="1" style=${inp}/>
        </div>
        <div><label style=${lbl}>Unit cost ($)</label>
          <input type="number" min="0" inputMode="decimal" value=${cost} onChange=${e=>setCost(e.target.value)} placeholder="0.00" style=${inp}/>
        </div>
      </div>
      <button class="btn primary press-scale" onClick=${add}>+ Add Tire</button>
    </div>

    <div class="card card-pad stack">
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
        <div>
          <div style=${{fontWeight:700,color:"var(--t1)"}}>${totalUnits} units</div>
          <div style=${{fontSize:11,color:"var(--t3)"}}>Value: ${money(totalValue)}</div>
        </div>
        <button class="btn sm" onClick=${()=>setCompact(!compact)}>${compact?"Detail":"Compact"}</button>
      </div>
      <input type="search" value=${filter} onChange=${e=>setFilter(e.target.value)} placeholder="Search by size or brand…" style=${inp}/>
      ${filtered.length===0?html`<div style=${{color:"var(--t3)",fontSize:13,textAlign:"center",padding:"20px 0"}}>No inventory items match.</div>`:
        filtered.map(i=>html`<div key=${i.id} style=${{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
          <div style=${{flex:1,minWidth:0}}>
            <div style=${{fontWeight:700,color:"var(--t1)",fontFamily:'"IBM Plex Mono",monospace'}}>${i.size}${i.condition&&i.condition.toLowerCase()==="used"?html` <span style=${{fontSize:10,padding:"2px 6px",background:"var(--s3)",borderRadius:4,marginLeft:6,color:"var(--t3)"}}>USED</span>`:""}</div>
            ${!compact&&html`<div style=${{fontSize:11,color:"var(--t3)"}}>${i.brand||""}${i.cost?" · "+money(i.cost)+" each":""}</div>`}
          </div>
          <div style=${{display:"flex",alignItems:"center",gap:4}}>
            <button class="btn sm" onClick=${()=>adjustQty(i.id,-1)}>−</button>
            <div style=${{minWidth:32,textAlign:"center",fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,color:i.qty<=0?"var(--red)":"var(--t1)"}}>${i.qty}</div>
            <button class="btn sm" onClick=${()=>adjustQty(i.id,1)}>+</button>
            <button class="btn sm danger" onClick=${()=>del(i.id)}>🗑</button>
          </div>
        </div>`)}
    </div>
  </div></div>`;
}

// ── Settings ────────────────────────────────────────────────────────────────
function Settings({settings,setSettings,jobs,inventory,toast}) {
  const update=(k,v)=>setSettings(p=>({...p,[k]:v}));
  const inp={width:"100%",border:"1px solid var(--border)",background:"var(--s3)",color:"var(--t1)",borderRadius:"var(--r3)",padding:"12px 14px",outline:"none",fontSize:15};
  const lbl={fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",color:"var(--t2)",marginBottom:6,display:"block"};

  const exportCSV=()=>{
    const rows=[["Date","Service","Area","Customer","Phone","Vehicle","Tire Size","Qty","Revenue","Tire Cost","Misc","Miles","Payment","Status","Source"]];
    (jobs||[]).forEach(j=>rows.push([
      j.date||"",j.service||"",j.area||"",j.customerName||"",j.customerPhone||"",j.vehicleType||"",j.tireSize||"",
      j.qty||1,j.revenue||0,j.tireCost||0,j.miscCost||0,j.miles||0,j.payment||"",j.status||"",j.source||""
    ]));
    const csv=rows.map(r=>r.map(c=>{const s=String(c);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}).join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download="nk-on-time-"+TODAY()+".csv"; a.click();
    URL.revokeObjectURL(url);
    toast&&toast("CSV exported","ok");
  };
  const exportBackup=()=>{
    const data={settings,jobs,inventory,exportedAt:new Date().toISOString(),version:"nk-v10"};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download="nk-on-time-backup-"+TODAY()+".json"; a.click();
    URL.revokeObjectURL(url);
    toast&&toast("Backup exported","ok");
  };

  return html`<div class="screen"><div class="page page-enter">
    <div class="section-label">Business</div>
    <div class="card card-pad stack">
      <div><label style=${lbl}>Business name</label>
        <input type="text" value=${settings.businessName||""} onChange=${e=>update("businessName",e.target.value)} style=${inp}/>
      </div>
      <div><label style=${lbl}>Google review URL</label>
        <input type="url" value=${settings.googleReviewUrl||""} onChange=${e=>update("googleReviewUrl",e.target.value)} placeholder="https://g.page/r/…" style=${inp}/>
        <div style=${{fontSize:11,color:"var(--t3)",marginTop:4}}>Used for the "Send Review" SMS template.</div>
      </div>
    </div>

    <div class="section-label">Owners &amp; Splits</div>
    <div class="card card-pad stack">
      <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <div><label style=${lbl}>Owner 1 name</label><input type="text" value=${settings.owner1Name||""} onChange=${e=>update("owner1Name",e.target.value)} style=${inp}/></div>
        <div><label style=${lbl}>Split %</label><input type="number" min="0" max="100" value=${settings.profitSplit1||50} onChange=${e=>update("profitSplit1",Number(e.target.value))} style=${inp}/></div>
      </div>
      <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <div><label style=${lbl}>Owner 2 name</label><input type="text" value=${settings.owner2Name||""} onChange=${e=>update("owner2Name",e.target.value)} style=${inp}/></div>
        <div><label style=${lbl}>Split %</label><input type="number" min="0" max="100" value=${settings.profitSplit2||50} onChange=${e=>update("profitSplit2",Number(e.target.value))} style=${inp}/></div>
      </div>
    </div>

    <div class="section-label">Pricing</div>
    <div class="card card-pad stack">
      <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <div><label style=${lbl}>Cost per mile ($)</label><input type="number" step="0.01" value=${settings.costPerMile||0.65} onChange=${e=>update("costPerMile",Number(e.target.value))} style=${inp}/></div>
        <div><label style=${lbl}>Skip threshold ($)</label><input type="number" value=${settings.skipThreshold||70} onChange=${e=>update("skipThreshold",Number(e.target.value))} style=${inp}/></div>
      </div>
      <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <div><label style=${lbl}>Default target profit ($)</label><input type="number" value=${settings.defaultTargetProfit||100} onChange=${e=>update("defaultTargetProfit",Number(e.target.value))} style=${inp}/></div>
        <div><label style=${lbl}>Weekly goal ($)</label><input type="number" value=${settings.weeklyGoal||1200} onChange=${e=>update("weeklyGoal",Number(e.target.value))} style=${inp}/></div>
      </div>
    </div>

    <div class="section-label">Recurring fixed expenses</div>
    <div class="card card-pad stack">
      <div style=${{fontSize:12,color:"var(--t3)"}}>Toggle items off to exclude them from the weekly fixed allocation.</div>
      ${(settings.expenses||[]).map(e=>html`<div key=${e.id} style=${{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
        <input type="checkbox" checked=${e.active!==false} onChange=${ev=>update("expenses",(settings.expenses||[]).map(x=>x.id===e.id?{...x,active:ev.target.checked}:x))}/>
        <input type="text" value=${e.name} onChange=${ev=>update("expenses",(settings.expenses||[]).map(x=>x.id===e.id?{...x,name:ev.target.value}:x))} style=${{...inp,padding:"6px 8px",flex:1}}/>
        <input type="number" value=${e.amount} onChange=${ev=>update("expenses",(settings.expenses||[]).map(x=>x.id===e.id?{...x,amount:Number(ev.target.value)}:x))} style=${{...inp,padding:"6px 8px",width:90,textAlign:"right",fontFamily:'"IBM Plex Mono",monospace'}}/>
      </div>`)}
      <button class="btn sm" onClick=${()=>update("expenses",[...(settings.expenses||[]),{id:uid(),name:"New expense",amount:0,active:true}])}>+ Add fixed expense</button>
    </div>

    <div class="section-label">Data</div>
    <div class="card card-pad stack">
      <div style=${{display:"flex",gap:8,flexWrap:"wrap"}}>
        <button class="btn" onClick=${exportCSV}>📊 Export jobs CSV</button>
        <button class="btn" onClick=${exportBackup}>💾 Backup JSON</button>
      </div>
    </div>

    <div style=${{textAlign:"center",fontSize:11,color:"var(--t3)",padding:"20px 0",fontFamily:'"IBM Plex Mono",monospace'}}>
      N &amp; K On Time v10 · Firebase Sync
    </div>
  </div></div>`;
}

// ── ToastHost ───────────────────────────────────────────────────────────────
function ToastHost({toasts}) {
  return html`<div style=${{position:"fixed",bottom:88,left:0,right:0,display:"flex",flexDirection:"column",alignItems:"center",gap:8,pointerEvents:"none",zIndex:9999,padding:"0 16px"}}>
    ${toasts.map(t=>html`<div key=${t.id} style=${{
      background:t.kind==="err"?"linear-gradient(135deg,#ef4444,#dc2626)":t.kind==="ok"?"linear-gradient(135deg,#22c55e,#16a34a)":"linear-gradient(135deg,#3b82f6,#2563eb)",
      color:"#fff",padding:"10px 20px",borderRadius:24,fontSize:13,fontWeight:600,
      boxShadow:"0 6px 20px rgba(0,0,0,.45)",animation:"toastIn .25s ease",maxWidth:"100%"
    }}>${t.msg}</div>`)}
  </div>`;
}

// ── App ─────────────────────────────────────────────────────────────────────
const WIPE_KEY = "nk_inv_wiped_at";

function App() {
  // Auth
  const [user,setUser]=useState(null);
  const [authReady,setAuthReady]=useState(false);
  const [loading,setLoading]=useState(true);

  // Core state — local-first with Firebase sync overlay
  const [jobs,setJobs]=useState(()=>migrateOldJobs());
  const [settings,setSettings]=useState(()=>({...DEFAULT_SETTINGS,...load(KEYS.settings,{})}));
  const [inventory,setInventory]=useState(()=>{
    const stored=load(KEYS.inventory,null);
    return Array.isArray(stored)?stored:DEFAULT_INVENTORY.map(sanitizeInvItem);
  });
  const [expenses,setExpenses]=useState(()=>load(KEYS.expenses,[]));

  // UI
  const [tab,setTab]=useState("dashboard");
  const [form,setForm]=useState(()=>EMPTY_JOB());
  const [recentSizes,setRecentSizes]=useState(()=>load(KEYS.sizes,[]));
  const [syncStatus,setSyncStatus]=useState("local");
  const [toasts,setToasts]=useState([]);
  const toastIdRef=useRef(0);

  const toast=useCallback((msg,kind)=>{
    const id=++toastIdRef.current;
    setToasts(p=>[...p,{id,msg,kind}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),2400);
  },[]);

  // Auth listener
  useEffect(()=>{
    if(!_auth){ setUser({uid:"local"}); setAuthReady(true); setLoading(false); return; }
    const unsub=_auth.onAuthStateChanged(u=>{
      setUser(u||null);
      setAuthReady(true);
      setLoading(false);
    });
    return ()=>unsub();
  },[]);

  // Persist locally
  useEffect(()=>persist(KEYS.jobs,jobs),[jobs]);
  useEffect(()=>persist(KEYS.settings,settings),[settings]);
  useEffect(()=>persist(KEYS.inventory,inventory),[inventory]);
  useEffect(()=>persist(KEYS.expenses,expenses),[expenses]);
  useEffect(()=>persist(KEYS.sizes,recentSizes),[recentSizes]);

  // Firebase sync overlay
  useEffect(()=>{
    if(!user||isLocalUser(user)||!_db){ setSyncStatus("local"); return; }
    setSyncStatus("syncing");
    const unsubs=[];
    let received=0;
    const checkConnected=()=>{ received++; if(received>=4) setSyncStatus("connected"); };

    unsubs.push(fbListen(jobCol(),docs=>{
      const wipedAt=Number(load(WIPE_KEY,0))||0;
      if(Date.now()-wipedAt < 10000) { checkConnected(); return; }
      const hyd=docs.map(hydrateJobDoc).map(sanitizeJob);
      setJobs(hyd);
      checkConnected();
    }));
    unsubs.push(fbListen(invCol(),docs=>{
      const wipedAt=Number(load(WIPE_KEY,0))||0;
      if(Date.now()-wipedAt < 10000) { checkConnected(); return; }
      setInventory(docs.map(sanitizeInvItem));
      checkConnected();
    }));
    unsubs.push(fbListen(expCol(),docs=>{
      setExpenses(docs);
      checkConnected();
    }));
    if(settingDoc()){
      const u=settingDoc().onSnapshot(d=>{
        if(d.exists){
          const h=hydrateSettingsDoc(d.data());
          setSettings(p=>({...p,...h}));
        }
        checkConnected();
      },e=>console.warn("settings sync:",e));
      unsubs.push(u);
    }
    return ()=>unsubs.forEach(u=>{try{u();}catch{}});
  },[user]);

  // Job operations
  const saveJob=useCallback(async(job)=>{
    setJobs(prev=>{
      const i=prev.findIndex(j=>j.id===job.id);
      const arr=prev.slice();
      if(i>=0) arr[i]=job; else arr.push(job);
      return arr;
    });
    if(job.tireSize){
      setRecentSizes(prev=>[job.tireSize,...prev.filter(s=>s!==job.tireSize)].slice(0,12));
    }
    if(user&&!isLocalUser(user)) await fbSet(jobCol(),job.id,job);
  },[user]);

  const deleteJob=useCallback(async(j)=>{
    if(!confirm("Delete this job?")) return;
    setJobs(prev=>prev.filter(x=>x.id!==j.id));
    if(j.inventoryDeductions) restoreInventoryDeduction(j.inventoryDeductions,setInventory);
    if(user&&!isLocalUser(user)) await fbDel(jobCol(),j.id);
    toast("Job deleted","ok");
  },[user,toast]);

  const editJob=useCallback((j)=>{ setForm({...j}); setTab("add"); },[]);
  const onInvoice=useCallback((j)=>{ sendInvoice(j,settings); },[settings]);
  const onReview=useCallback((j)=>{
    openReviewSMS(j.customerPhone,settings.googleReviewUrl,j.customerName,j.service,j.area);
  },[settings]);

  // Settings sync (debounced)
  useEffect(()=>{
    if(!user||isLocalUser(user)||!settingDoc()) return;
    const t=setTimeout(()=>{
      try{ settingDoc().set(settings,{merge:true}); }catch(e){console.warn(e);}
    },500);
    return ()=>clearTimeout(t);
  },[settings,user]);

  // Inventory sync (debounced batch)
  useEffect(()=>{
    if(!user||isLocalUser(user)||!_db) return;
    const t=setTimeout(()=>{
      const ops=inventory.map(i=>({type:"set",ref:invCol().doc(String(i.id)),data:i}));
      fbBatch(ops);
    },800);
    return ()=>clearTimeout(t);
  },[inventory,user]);

  // Expenses sync (debounced batch)
  useEffect(()=>{
    if(!user||isLocalUser(user)||!_db) return;
    const t=setTimeout(()=>{
      const ops=expenses.map(e=>({type:"set",ref:expCol().doc(String(e.id)),data:e}));
      fbBatch(ops);
    },800);
    return ()=>clearTimeout(t);
  },[expenses,user]);

  const onSignOut=useCallback(()=>{
    if(_auth) _auth.signOut().catch(()=>{});
  },[]);

  // Loading screen
  if(loading){
    return html`<div style=${{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#0a0a0f"}}>
      <img src=${LOGO_SRC} alt="NK" onError=${e=>e.target.style.display="none"} class="logo-pulse" style=${{width:80,height:80,objectFit:"contain",borderRadius:18,marginBottom:16,boxShadow:"0 4px 20px rgba(0,0,0,.6)"}}/>
      <div class="shimmer-text" style=${{fontSize:20,fontWeight:700}}>N &amp; K On Time</div>
      <div style=${{color:"#555",fontSize:12,marginTop:6}}>Loading…</div>
    </div>`;
  }

  // Auth screen
  if(_auth && authReady && !user){
    return html`<${AuthScreen} onAuth=${u=>setUser(u)}/>`;
  }

  // Bottom nav tabs
  const tabs=[
    {id:"dashboard",label:"Home",ico:"🏠"},
    {id:"add",label:"Add",ico:"＋"},
    {id:"history",label:"History",ico:"📋"},
    {id:"inventory",label:"Stock",ico:"🛞"},
    {id:"expenses",label:"$",ico:"💵"},
    {id:"payouts",label:"Pay",ico:"💰"},
    {id:"settings",label:"Settings",ico:"⚙️"},
  ];

  return html`<div class="app" style=${{height:"100%",display:"flex",flexDirection:"column"}}>
    <${Header} syncStatus=${syncStatus} onSignOut=${user&&!isLocalUser(user)?onSignOut:null}/>
    <div style=${{flex:1,overflow:"auto",WebkitOverflowScrolling:"touch"}}>
      ${tab==="dashboard"&&html`<${Dashboard} jobs=${jobs} settings=${settings} setTab=${setTab} inventory=${inventory} onRepeat=${j=>{setForm({...j,id:"",date:TODAY(),startTime:""});setTab("add");}} onStartJob=${()=>setTab("add")}/>`}
      ${tab==="add"&&html`<${AddJob} form=${form} setForm=${setForm} onSave=${saveJob} settings=${settings} recentSizes=${recentSizes} inventory=${inventory} toast=${toast}/>`}
      ${tab==="history"&&html`<${History} jobs=${jobs} settings=${settings} onEdit=${editJob} onDelete=${deleteJob} onInvoice=${onInvoice} onReview=${onReview}/>`}
      ${tab==="inventory"&&html`<${Inventory} inventory=${inventory} setInventory=${setInventory} toast=${toast}/>`}
      ${tab==="expenses"&&html`<${Expenses} expenses=${expenses} setExpenses=${setExpenses} toast=${toast}/>`}
      ${tab==="payouts"&&html`<${Payouts} jobs=${jobs} expenses=${expenses} settings=${settings}/>`}
      ${tab==="settings"&&html`<${Settings} settings=${settings} setSettings=${setSettings} jobs=${jobs} inventory=${inventory} toast=${toast}/>`}
    </div>
    <div class="bottom-nav">
      ${tabs.map(t=>html`<button key=${t.id} class=${"nav-btn"+(tab===t.id?" active":"")} data-id=${t.id} onClick=${()=>{setTab(t.id);haptic(8);}}>
        <div class="ico">${t.ico}</div>
        <div>${t.label}</div>
      </button>`)}
    </div>
    <${ToastHost} toasts=${toasts}/>
  </div>`;
}

// ── Mount ───────────────────────────────────────────────────────────────────
const _rootEl = document.getElementById("root");
if (_rootEl) {
  const root = ReactDOM.createRoot(_rootEl);
  root.render(React.createElement(ErrorBoundary, null, React.createElement(App)));
}
</script>
</body>
</html>
