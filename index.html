// ── History ─────────────────────────────────────────────────────────────────
function History({jobs,settings,onEdit,onDelete,onInvoice,onReview}) {
  const groups=useMemo(()=>groupByWeek(jobs),[jobs]);
  if(!jobs||jobs.length===0){
    return html`<div class="screen"><div class="page page-enter">
      <${EmptyState} icon="📋" title="No jobs yet" sub="Logged jobs will appear here."/>
    </div></div>`;
  }
  return html`<div class="screen"><div class="page page-enter">
    <div class="section-label">Job History</div>
    ${groups.map(([weekStart,weekJobs])=>{
      const sum=weekSummary(weekJobs,settings);
      return html`<div key=${weekStart} class="stack" style=${{marginBottom:18}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"4px 4px"}}>
          <div style=${{fontSize:12,fontWeight:800,color:"var(--t2)",textTransform:"uppercase",letterSpacing:".5px"}}>${weekLabel(weekStart)}</div>
          <div style=${{fontSize:12,color:"var(--t3)",fontFamily:'"IBM Plex Mono",monospace'}}>${money(sum.revenue)} · ${money(sum.grossProfit)} P</div>
        </div>
        ${weekJobs.map(j=>html`<${HistoryJobRow} key=${j.id} job=${j} settings=${settings} onEdit=${onEdit} onDelete=${onDelete} onInvoice=${onInvoice} onReview=${onReview}/>`)}
      </div>`;
    })}
  </div></div>`;
}

// ── Expenses ────────────────────────────────────────────────────────────────
function Expenses({expenses,setExpenses,toast}) {
  const [name,setName]=useState("");
  const [amount,setAmount]=useState("");
  const [date,setDate]=useState(TODAY());
  const total=expenses.reduce((t,e)=>t+Number(e.amount||0),0);

  const add=()=>{
    if(!name.trim()||!Number(amount)){ toast&&toast("Name and amount required","err"); return; }
    setExpenses(prev=>[...prev,{id:uid(),name:name.trim(),amount:Number(amount),date:date||TODAY()}]);
    setName(""); setAmount(""); setDate(TODAY());
    haptic(10); toast&&toast("Expense added","ok");
  };
  const del=id=>setExpenses(prev=>prev.filter(e=>e.id!==id));

  const inp={width:"100%",border:"1px solid var(--border)",background:"var(--s3)",color:"var(--t1)",borderRadius:"var(--r3)",padding:"12px 14px",outline:"none",fontSize:15};
  const lbl={fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",color:"var(--t2)",marginBottom:6,display:"block"};

  return html`<div class="screen"><div class="page page-enter">
    <div class="section-label">Expenses</div>
    <div class="card card-pad stack">
      <div><label style=${lbl}>Description</label>
        <input type="text" value=${name} onChange=${e=>setName(e.target.value)} placeholder="e.g. Tire restock, fuel, supplies" style=${inp}/>
      </div>
      <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <div><label style=${lbl}>Amount</label>
          <input type="number" inputMode="decimal" min="0" value=${amount} onChange=${e=>setAmount(e.target.value)} placeholder="0.00" style=${inp}/>
        </div>
        <div><label style=${lbl}>Date</label>
          <input type="date" value=${date} onChange=${e=>setDate(e.target.value)} style=${inp}/>
        </div>
      </div>
      <button class="btn primary press-scale" onClick=${add}>+ Add Expense</button>
    </div>

    <div class="card card-pad stack">
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
        <div style=${{fontWeight:700,color:"var(--t1)"}}>Recent Expenses</div>
        <div style=${{fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,color:"var(--t1)"}}>${money(total)}</div>
      </div>
      ${expenses.length===0?html`<div style=${{color:"var(--t3)",fontSize:13,textAlign:"center",padding:"20px 0"}}>No expenses logged yet.</div>`:
        expenses.slice().reverse().map(e=>html`<div key=${e.id} style=${{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
          <div>
            <div style=${{fontWeight:600,color:"var(--t1)"}}>${e.name}</div>
            <div style=${{fontSize:11,color:"var(--t3)"}}>${e.date||""}</div>
          </div>
          <div style=${{display:"flex",alignItems:"center",gap:10}}>
            <div style=${{fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,color:"var(--t1)"}}>${money(e.amount)}</div>
            <button class="btn sm danger" onClick=${()=>del(e.id)}>🗑</button>
          </div>
        </div>`)}
    </div>
  </div></div>`;
}

// ── Payouts ─────────────────────────────────────────────────────────────────
function Payouts({jobs,expenses,settings}) {
  const groups=useMemo(()=>groupByWeek(jobs),[jobs]);
  const ownerName=settings.ownerName||"Owner";
  return html`<div class="screen"><div class="page page-enter">
    <div class="section-label">Owner Payouts</div>
    <div class="card card-pad">
      <div style=${{fontSize:12,color:"var(--t3)",lineHeight:1.5}}>
        Net profit goes to <strong style=${{color:"var(--t2)"}}>${ownerName}</strong> after direct costs and weekly fixed expenses.
      </div>
    </div>
    ${groups.length===0?html`<${EmptyState} icon="💰" title="No payouts yet" sub="Log jobs to see weekly payouts here."/>`:""}
    ${groups.map(([weekStart,weekJobs])=>{
      const sum=weekSummary(weekJobs,settings);
      const fixed=weeklyFixed(settings);
      const net=r2(sum.grossProfit-fixed);
      return html`<div key=${weekStart} class="card card-pad stack">
        <div style=${{fontSize:12,fontWeight:800,color:"var(--t2)",textTransform:"uppercase",letterSpacing:".5px"}}>${weekLabel(weekStart)}</div>
        <div style=${{display:"grid",gridTemplateColumns:"1fr auto",gap:8,fontSize:13}}>
          <div style=${{color:"var(--t2)"}}>Revenue</div><div style=${{textAlign:"right",fontFamily:'"IBM Plex Mono",monospace',color:"var(--t1)"}}>${money(sum.revenue)}</div>
          <div style=${{color:"var(--t2)"}}>Direct costs</div><div style=${{textAlign:"right",fontFamily:'"IBM Plex Mono",monospace',color:"var(--t3)"}}>−${money(sum.directCosts)}</div>
          <div style=${{color:"var(--t2)"}}>Weekly fixed</div><div style=${{textAlign:"right",fontFamily:'"IBM Plex Mono",monospace',color:"var(--t3)"}}>−${money(fixed)}</div>
          <div style=${{fontWeight:700,paddingTop:6,borderTop:"1px solid var(--border)",color:"var(--t1)"}}>Net</div>
          <div style=${{textAlign:"right",fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,paddingTop:6,borderTop:"1px solid var(--border)",color:net>=0?"var(--green)":"var(--red)"}}>${money(net)}</div>
        </div>
        <div style=${{display:"grid",gridTemplateColumns:"1fr auto",gap:8,padding:"10px 12px",background:"var(--s3)",borderRadius:8,fontSize:13}}>
          <div style=${{color:"var(--t2)"}}>${ownerName} payout</div>
          <div style=${{textAlign:"right",fontFamily:'"IBM Plex Mono",monospace',fontWeight:700,color:net>=0?"var(--green)":"var(--red)"}}>${money(net)}</div>
        </div>
      </div>`;
    })}
  </div></div>`;
}

// ── Inventory ───────────────────────────────────────────────────────────────
// ── BulkUploadModal — CSV-paste import for inventory ───────────────────────
function BulkUploadModal({open,onClose,inventory,setInventory,toast}) {
  const [text,setText]=useState("");
  const [parsed,setParsed]=useState(null);
  if (!open) return "";
  const example = "275/55R20, Michelin, Used, 2, 65, 140, Van, Good tread\n225/60R17, Goodyear, New, 4, 95, 170, Storage, New set";
  const doParse = () => {
    const result = parseBulkInventoryCSV(text);
    setParsed(result);
    if (result.rows.length === 0) {
      toast && toast("No rows found", "err");
    }
  };
  const doImport = () => {
    if (!parsed) return;
    const validRows = parsed.rows.filter(r=>r.ok);
    if (validRows.length === 0) { toast&&toast("No valid rows to import","err"); return; }
    const {nextInventory, added, merged} = mergeBulkInventory(inventory, validRows);
    setInventory(nextInventory);
    haptic(15);
    toast && toast(`Imported: ${added} added, ${merged} merged`, "ok");
    setText(""); setParsed(null); onClose();
  };
  const overlay={position:"fixed",inset:0,background:"rgba(0,0,0,.7)",zIndex:9998,display:"flex",alignItems:"flex-end",justifyContent:"center",padding:"0"};
  const panel={width:"100%",maxWidth:560,maxHeight:"90vh",background:"var(--s1)",borderRadius:"16px 16px 0 0",border:"1px solid var(--border)",display:"flex",flexDirection:"column",animation:"fadeSlideUp .25s ease",paddingBottom:"env(safe-area-inset-bottom)"};
  const head={padding:"14px 18px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"};
  const body={padding:"14px 18px",overflowY:"auto",flex:1,WebkitOverflowScrolling:"touch"};
  const lbl={fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",color:"var(--t2)",marginBottom:6,display:"block"};

  return html`<div style=${overlay} onClick=${onClose}>
    <div style=${panel} onClick=${e=>e.stopPropagation()}>
      <div style=${head}>
        <div style=${{fontSize:16,fontWeight:800,color:"var(--t1)"}}>Bulk Upload Stock</div>
        <button class="btn sm" onClick=${onClose}>✕</button>
      </div>
      <div style=${body}>
        ${!parsed&&html`<div>
          <div style=${{fontSize:13,color:"var(--t2)",lineHeight:1.5,marginBottom:10}}>
            Paste one tire per line. Either format works:<br/>
            <strong style=${{color:"var(--t1)"}}>• CSV:</strong> tireSize, brand, condition, quantity, cost, sellingPrice, location, notes<br/>
            <strong style=${{color:"var(--t1)"}}>• Quick:</strong> "225/65R17 used 2" or "225/65R17 new 1 truck"<br/>
            Duplicates (same size + brand + condition + location) will be merged.
          </div>
          <div style=${{padding:"10px 12px",background:"var(--s3)",border:"1px solid var(--border2)",borderRadius:8,fontFamily:'"IBM Plex Mono",monospace',fontSize:11,color:"var(--t3)",marginBottom:10,whiteSpace:"pre-wrap"}}>${example}</div>
          <label style=${lbl}>CSV-style rows</label>
          <textarea value=${text} onChange=${e=>setText(e.target.value)} rows="9"
            placeholder="275/55R20, Michelin, Used, 2, 65, 140, Van, Good tread"
            style=${{width:"100%",border:"1px solid var(--border)",background:"var(--s3)",color:"var(--t1)",borderRadius:8,padding:"10px 12px",fontFamily:'"IBM Plex Mono",monospace',fontSize:13,resize:"vertical",minHeight:140,outline:"none"}}/>
          <button class="btn primary" style=${{width:"100%",marginTop:10,padding:"12px"}} onClick=${doParse}>Preview Import</button>
        </div>`}
        ${parsed&&html`<div>
          <div style=${{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
            <span class="pill green">${parsed.rows.filter(r=>r.ok).length} valid</span>
            ${parsed.rows.filter(r=>!r.ok).length>0&&html`<span class="pill red">${parsed.rows.filter(r=>!r.ok).length} errors</span>`}
          </div>
          <div style=${{maxHeight:300,overflowY:"auto",border:"1px solid var(--border)",borderRadius:8,marginBottom:10}}>
            ${parsed.rows.map(r=>html`<div key=${r.rowNum} style=${{padding:"10px 12px",borderBottom:"1px solid var(--border2)",fontSize:12}}>
              <div style=${{display:"flex",justifyContent:"space-between",gap:8,alignItems:"center"}}>
                <div style=${{fontFamily:'"IBM Plex Mono",monospace',fontSize:11,color:r.ok?"var(--t1)":"var(--red)",flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>Row ${r.rowNum}: ${r.raw}</div>
                ${r.ok?html`<span class="pill green sm">OK</span>`:html`<span class="pill red sm">ERR</span>`}
              </div>
              ${r.ok&&html`<div style=${{marginTop:4,color:"var(--t3)",fontSize:11}}>
                ${r.item.size} · ${r.item.brand||"—"} · ${r.item.condition} · qty ${r.item.qty}${r.item.cost?" · $"+r.item.cost+" each":""}${r.item.location?" · "+r.item.location:""}
              </div>`}
              ${!r.ok&&html`<div style=${{marginTop:4,color:"var(--red)",fontSize:11}}>${r.errorMsg}</div>`}
            </div>`)}
          </div>
          <div style=${{display:"flex",gap:8}}>
            <button class="btn" style=${{flex:1,padding:"12px"}} onClick=${()=>setParsed(null)}>← Back</button>
            <button class="btn primary" style=${{flex:2,padding:"12px"}} onClick=${doImport} disabled=${parsed.rows.filter(r=>r.ok).length===0}>Import ${parsed.rows.filter(r=>r.ok).length} ${parsed.rows.filter(r=>r.ok).length===1?"row":"rows"}</button>
          </div>
        </div>`}
      </div>
    </div>
  </div>`;
}

function Inventory({inventory,setInventory,toast}) {
  const [size,setSize]=useState("");
  const [brand,setBrand]=useState("");
  const [condition,setCondition]=useState("New");
  const [qty,setQty]=useState("");
  const [cost,setCost]=useState("");
  const [location,setLocation]=useState("");
  const [filter,setFilter]=useState("");
  const [compact,setCompact]=useState(()=>load("nk_inv_compact",false));
  const [bulkOpen,setBulkOpen]=useState(false);
  const [addOpen,setAddOpen]=useState(false);
  const [stockFilter,setStockFilter]=useState("all"); // 'all' | 'in' | 'out' | rim like 'R17'

  useEffect(()=>persist("nk_inv_compact",compact),[compact]);

  const totalUnits=inventory.reduce((t,i)=>t+Number(i.qty||0),0);
  const totalValue=inventory.reduce((t,i)=>t+Number(i.qty||0)*Number(i.cost||0),0);
  const outOfStock=inventory.filter(i=>Number(i.qty||0)<=0).length;
  const inStockCount=inventory.length-outOfStock;

  // Extract rim diameter (R15, R16…) from a size string for grouping/filtering.
  const rimOf=(s)=>{ const m=String(s||"").match(/R(\d{2,3})$/i); return m?("R"+m[1]):""; };
  const rimFacets=useMemo(()=>{
    const counts={};
    inventory.forEach(i=>{ const r=rimOf(i.size); if(r) counts[r]=(counts[r]||0)+1; });
    return Object.entries(counts).sort((a,b)=>Number(a[0].slice(1))-Number(b[0].slice(1)));
  },[inventory]);

  const add=()=>{
    if(!size.trim()){ toast&&toast("Tire size required","err"); return; }
    const norm=normalizeTireSize(size)||size.trim();
    setInventory(prev=>{
      const arr=Array.isArray(prev)?prev.slice():[];
      // Dedupe key matches the bulk-upload merge logic: size + brand + condition + location
      const newKey=invDedupeKey({size:norm,brand,condition,location});
      const matchIdx=arr.findIndex(i=>invDedupeKey(i)===newKey);
      if(matchIdx>=0){
        arr[matchIdx]={...arr[matchIdx], qty:Number(arr[matchIdx].qty||0)+Number(qty||1), cost:Number(cost||arr[matchIdx].cost||0)};
      } else {
        arr.push(sanitizeInvItem({id:uid(),size:norm,brand,condition,qty:Number(qty||1),cost:Number(cost||0),location}));
      }
      return arr;
    });
    setSize(""); setBrand(""); setQty(""); setCost(""); setLocation("");
    haptic(10); toast&&toast("Added to inventory","ok");
    setAddOpen(false);
  };

  const adjustQty=(id,delta)=>{
    setInventory(prev=>(Array.isArray(prev)?prev:[]).map(i=>i.id===id?{...i,qty:Math.max(0,Number(i.qty||0)+delta)}:i));
  };
  // Per spec: hitting trash on a 0-qty row deletes it. On a row with qty>0, the
  // first click marks it out-of-stock (qty=0) — a confirm step before destroying it.
  const del=id=>{
    const item=(Array.isArray(inventory)?inventory:[]).find(i=>i.id===id);
    if (item && Number(item.qty||0) > 0) {
      if (!confirm(`Mark ${item.size} as out of stock? (Sets quantity to 0 — tap trash again to remove the row.)`)) return;
      setInventory(prev=>(Array.isArray(prev)?prev:[]).map(i=>i.id===id?{...i,qty:0}:i));
      toast && toast("Marked out of stock", "info");
      return;
    }
    if (!confirm("Remove this empty inventory row permanently?")) return;
    setInventory(prev=>(Array.isArray(prev)?prev:[]).filter(i=>i.id!==id));
  };

  const filtered=inventory.filter(i=>{
    if(stockFilter==="in"  && Number(i.qty||0)<=0) return false;
    if(stockFilter==="out" && Number(i.qty||0)>0)  return false;
    if(stockFilter.startsWith("R") && rimOf(i.size)!==stockFilter) return false;
    if(!filter.trim()) return true;
    const q=filter.toLowerCase();
    return (i.size||"").toLowerCase().includes(q)||(i.brand||"").toLowerCase().includes(q)||(i.location||"").toLowerCase().includes(q);
  }).sort((a,b)=>{
    const ar=Number((rimOf(a.size)||"R0").slice(1))||0;
    const br=Number((rimOf(b.size)||"R0").slice(1))||0;
    if(ar!==br) return ar-br;
    return (a.size||"").localeCompare(b.size||"");
  });

  // Group filtered rows by rim diameter for section headers
  const grouped = useMemo(()=>{
    const groups=[];
    let curRim=null, curList=null;
    filtered.forEach(it=>{
      const r=rimOf(it.size)||"Other";
      if(r!==curRim){ curRim=r; curList=[]; groups.push([r,curList]); }
      curList.push(it);
    });
    return groups;
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[filtered]);

  const inp={width:"100%",border:"1px solid var(--border)",background:"var(--s3)",color:"var(--t1)",borderRadius:"var(--r3)",padding:"12px 14px",outline:"none",fontSize:15};
  const lbl={fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",color:"var(--t2)",marginBottom:6,display:"block"};

  return html`<div class="screen"><div class="page page-enter">
    <!-- Header row -->
    <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div>
        <div class="section-label" style=${{margin:0}}>Inventory</div>
        <div style=${{fontSize:11,color:"var(--t3)",marginTop:2}}>${inventory.length} ${inventory.length===1?"size":"sizes"} tracked</div>
      </div>
      <div style=${{display:"flex",gap:6}}>
        <button class="btn sm" onClick=${()=>setBulkOpen(true)}>📤 Bulk</button>
        <button class="btn primary sm press-scale" onClick=${()=>setAddOpen(!addOpen)} style=${{fontWeight:700}}>${addOpen?"✕ Close":"+ Add"}</button>
      </div>
    </div>

    <!-- KPI grid -->
    <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
      <div style=${{background:"var(--s2)",border:"1px solid var(--border)",borderRadius:12,padding:"12px 14px"}}>
        <div style=${{fontSize:10,fontWeight:800,textTransform:"uppercase",letterSpacing:".6px",color:"var(--t3)"}}>Total Units</div>
        <div style=${{fontSize:22,fontWeight:800,color:"var(--t1)",fontFamily:'"IBM Plex Mono",monospace',letterSpacing:"-1px",lineHeight:1.1}}>${totalUnits}</div>
        ${totalValue>0?html`<div style=${{fontSize:10,color:"var(--t3)"}}>Value: ${money(totalValue)}</div>`:html`<div style=${{fontSize:10,color:"var(--t3)"}}>&nbsp;</div>`}
      </div>
      <div style=${{background:"var(--s2)",border:"1px solid var(--border)",borderRadius:12,padding:"12px 14px"}}>
        <div style=${{fontSize:10,fontWeight:800,textTransform:"uppercase",letterSpacing:".6px",color:"var(--t3)"}}>In Stock</div>
        <div style=${{fontSize:22,fontWeight:800,color:inStockCount>0?"var(--green)":"var(--t2)",fontFamily:'"IBM Plex Mono",monospace',letterSpacing:"-1px",lineHeight:1.1}}>${inStockCount}</div>
        <div style=${{fontSize:10,color:"var(--t3)"}}>sizes available</div>
      </div>
      <div style=${{background:"var(--s2)",border:"1px solid var(--border)",borderRadius:12,padding:"12px 14px"}}>
        <div style=${{fontSize:10,fontWeight:800,textTransform:"uppercase",letterSpacing:".6px",color:"var(--t3)"}}>Out of Stock</div>
        <div style=${{fontSize:22,fontWeight:800,color:outOfStock>0?"var(--red)":"var(--t2)",fontFamily:'"IBM Plex Mono",monospace',letterSpacing:"-1px",lineHeight:1.1}}>${outOfStock}</div>
        <div style=${{fontSize:10,color:"var(--t3)"}}>needs restock</div>
      </div>
      <div style=${{background:"var(--s2)",border:"1px solid var(--border)",borderRadius:12,padding:"12px 14px"}}>
        <div style=${{fontSize:10,fontWeight:800,textTransform:"uppercase",letterSpacing:".6px",color:"var(--t3)"}}>Sizes</div>
        <div style=${{fontSize:22,fontWeight:800,color:"var(--t1)",fontFamily:'"IBM Plex Mono",monospace',letterSpacing:"-1px",lineHeight:1.1}}>${inventory.length}</div>
        <div style=${{fontSize:10,color:"var(--t3)"}}>unique entries</div>
      </div>
    </div>

    <!-- Collapsible add-tire panel -->
    ${addOpen&&html`<div class="card card-pad stack card-anim" style=${{marginBottom:12}}>
      <div style=${{fontSize:12,fontWeight:800,color:"var(--t2)",textTransform:"uppercase",letterSpacing:".5px",marginBottom:4}}>Add a tire</div>
      <div style=${{display:"grid",gridTemplateColumns:"2fr 1fr",gap:8}}>
        <div><label style=${lbl}>Tire size</label>
          <input type="text" value=${size} onChange=${e=>setSize(e.target.value)} placeholder="225/65R17" style=${inp}/>
        </div>
        <div><label style=${lbl}>Condition</label>
          <select value=${condition} onChange=${e=>setCondition(e.target.value)} style=${inp}>
            <option>New</option><option>Used</option>
          </select>
        </div>
      </div>
      <div><label style=${lbl}>Brand (optional)</label>
        <input type="text" value=${brand} onChange=${e=>setBrand(e.target.value)} style=${inp}/>
      </div>
      <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <div><label style=${lbl}>Quantity</label>
          <input type="number" min="1" inputMode="numeric" value=${qty} onChange=${e=>setQty(e.target.value)} placeholder="1" style=${inp}/>
        </div>
        <div><label style=${lbl}>Unit cost ($)</label>
          <input type="number" min="0" inputMode="decimal" value=${cost} onChange=${e=>setCost(e.target.value)} placeholder="0.00" style=${inp}/>
        </div>
      </div>
      <div><label style=${lbl}>Location (optional)</label>
        <input type="text" value=${location} onChange=${e=>setLocation(e.target.value)} placeholder="Van, Storage, Garage…" style=${inp}/>
      </div>
      <button class="btn primary press-scale" onClick=${add}>+ Add Tire</button>
    </div>`}

    <!-- Search + filter chips + density -->
    <div class="card card-pad stack" style=${{marginBottom:12,paddingBottom:14}}>
      <input type="search" value=${filter} onChange=${e=>setFilter(e.target.value)} placeholder="Search by size, brand or location…" style=${inp}/>
      <div style=${{display:"flex",gap:6,overflowX:"auto",WebkitOverflowScrolling:"touch",paddingBottom:2,margin:"0 -2px"}}>
        ${[
          {k:"all",l:"All",c:inventory.length},
          {k:"in",l:"In stock",c:inStockCount},
          {k:"out",l:"Out",c:outOfStock},
          ...rimFacets.map(([r,c])=>({k:r,l:r,c}))
        ].map(f=>html`<button key=${f.k} type="button" class=${"chip sm"+(stockFilter===f.k?" active":"")} onClick=${()=>setStockFilter(f.k)} style=${{flexShrink:0}}>${f.l} <span style=${{opacity:.6,marginLeft:4,fontFamily:'"IBM Plex Mono",monospace'}}>${f.c}</span></button>`)}
      </div>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:11,color:"var(--t3)"}}>
        <div>${filtered.length} ${filtered.length===1?"result":"results"}</div>
        <button class="btn sm" style=${{padding:"4px 10px",fontSize:11}} onClick=${()=>setCompact(!compact)}>${compact?"Detail view":"Compact view"}</button>
      </div>
    </div>

    <!-- Grouped list -->
    ${filtered.length===0?html`<div class="card card-pad" style=${{textAlign:"center",color:"var(--t3)",fontSize:13,padding:"30px 20px"}}>
      <div style=${{fontSize:36,marginBottom:8,opacity:.5}}>🛞</div>
      <div>No inventory items match your filters.</div>
    </div>`:
      grouped.map(([rim,items])=>html`<div key=${rim} style=${{marginBottom:14}}>
        <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0 4px 6px"}}>
          <div style=${{fontSize:11,fontWeight:800,color:"var(--t2)",textTransform:"uppercase",letterSpacing:"1px"}}>${rim==="Other"?"Other":rim+'" rim'}</div>
          <div style=${{fontSize:10,color:"var(--t3)",fontFamily:'"IBM Plex Mono",monospace'}}>${items.length} · ${items.reduce((t,i)=>t+Number(i.qty||0),0)}u</div>
        </div>
        <div class="card" style=${{padding:0}}>
          ${items.map((i,idx)=>{
            const oos = Number(i.qty||0) <= 0;
            const isUsed = i.condition && i.condition.toLowerCase()==="used";
            const isLow = !oos && Number(i.qty||0) === 1;
            return html`<div key=${i.id} style=${{
              display:"flex",alignItems:"center",gap:10,padding:"12px 14px",
              borderBottom:idx<items.length-1?"1px solid var(--border2)":"none",
              opacity:oos?.6:1,
              background:oos?"rgba(239,68,68,.025)":"transparent"
            }}>
              <div style=${{width:3,alignSelf:"stretch",borderRadius:2,background:oos?"var(--red)":isLow?"#f59e0b":"var(--green)",flexShrink:0,minHeight:38}}></div>
              <div style=${{flex:1,minWidth:0}}>
                <div style=${{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                  <span style=${{fontWeight:800,color:"var(--t1)",fontFamily:'"IBM Plex Mono",monospace',fontSize:15,letterSpacing:"-.3px"}}>${i.size}</span>
                  ${isUsed?html`<span style=${{fontSize:9,padding:"2px 6px",background:"var(--s3)",borderRadius:4,color:"var(--t3)",fontWeight:700,letterSpacing:".5px"}}>USED</span>`:html`<span style=${{fontSize:9,padding:"2px 6px",background:"rgba(34,197,94,.12)",borderRadius:4,color:"var(--green)",fontWeight:700,letterSpacing:".5px"}}>NEW</span>`}
                  ${oos?html`<span style=${{fontSize:9,padding:"2px 6px",background:"rgba(239,68,68,.15)",borderRadius:4,color:"var(--red)",fontWeight:800,letterSpacing:".5px"}}>OUT</span>`:isLow?html`<span style=${{fontSize:9,padding:"2px 6px",background:"rgba(245,158,11,.15)",borderRadius:4,color:"#f59e0b",fontWeight:800,letterSpacing:".5px"}}>LOW</span>`:""}
                </div>
                ${!compact&&(i.brand||i.cost||i.location)&&html`<div style=${{fontSize:11,color:"var(--t3)",marginTop:3,display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                  ${i.brand?html`<span style=${{color:"var(--t2)",fontWeight:600}}>${i.brand}</span>`:""}
                  ${i.cost?html`<span style=${{fontFamily:'"IBM Plex Mono",monospace'}}>${money(i.cost)}/ea</span>`:""}
                  ${i.location?html`<span>📍 ${i.location}</span>`:""}
                </div>`}
              </div>
              <div style=${{display:"flex",alignItems:"center",background:"var(--s3)",borderRadius:10,padding:2}}>
                <button onClick=${()=>adjustQty(i.id,-1)} style=${{width:32,height:32,border:"none",background:"transparent",color:oos?"var(--t3)":"var(--t1)",fontSize:18,fontWeight:700,borderRadius:8,cursor:"pointer"}}>−</button>
                <div style=${{minWidth:36,textAlign:"center",fontFamily:'"IBM Plex Mono",monospace',fontSize:16,fontWeight:800,color:oos?"var(--red)":isLow?"#f59e0b":"var(--t1)"}}>${i.qty}</div>
                <button onClick=${()=>adjustQty(i.id,1)} style=${{width:32,height:32,border:"none",background:"transparent",color:"var(--blue)",fontSize:18,fontWeight:700,borderRadius:8,cursor:"pointer"}}>+</button>
              </div>
              <button onClick=${()=>del(i.id)} style=${{width:32,height:32,border:"none",background:"rgba(239,68,68,.08)",color:"var(--red)",fontSize:14,borderRadius:8,cursor:"pointer",flexShrink:0}}>🗑</button>
            </div>`;
          })}
        </div>
      </div>`)
    }
    <${BulkUploadModal} open=${bulkOpen} onClose=${()=>setBulkOpen(false)} inventory=${inventory} setInventory=${setInventory} toast=${toast}/>
  </div></div>`;
}

// ── Settings ────────────────────────────────────────────────────────────────
function Settings({settings,setSettings,jobs,inventory,toast}) {
  const update=(k,v)=>setSettings(p=>({...p,[k]:v}));
  const inp={width:"100%",border:"1px solid var(--border)",background:"var(--s3)",color:"var(--t1)",borderRadius:"var(--r3)",padding:"12px 14px",outline:"none",fontSize:15};
  const lbl={fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",color:"var(--t2)",marginBottom:6,display:"block"};
  // Role: 'owner' (full access) | 'tech' (no pricing-rule editing). When set to
  // tech, all pricing-rule and tier-editing sections are hidden — the tech can
  // still create jobs and enter final price on Add Job.
  const isOwner = (settings.userRole||"owner") !== "tech";

  const exportCSV=()=>{
    const rows=[["Date","Service","Area","Customer","Phone","Vehicle","Tire Size","Qty","Revenue","Tire Cost","Misc","Miles","Payment","Status","Source"]];
    (jobs||[]).forEach(j=>rows.push([
      j.date||"",j.service||"",j.area||"",j.customerName||"",j.customerPhone||"",j.vehicleType||"",j.tireSize||"",
      j.qty||1,j.revenue||0,j.tireCost||0,j.miscCost||0,j.miles||0,j.payment||"",j.status||"",j.source||""
    ]));
    const csv=rows.map(r=>r.map(c=>{const s=String(c);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}).join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download="nk-on-time-"+TODAY()+".csv"; a.click();
    URL.revokeObjectURL(url);
    toast&&toast("CSV exported","ok");
  };
  const exportBackup=()=>{
    const data={settings,jobs,inventory,exportedAt:new Date().toISOString(),version:"nk-v10"};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download="nk-on-time-backup-"+TODAY()+".json"; a.click();
    URL.revokeObjectURL(url);
    toast&&toast("Backup exported","ok");
  };

  return html`<div class="screen"><div class="page page-enter">
    <div class="section-label">Account</div>
    <div class="card card-pad stack">
      <div><label style=${lbl}>Role on this device</label>
        <div class="chip-row">
          ${[{k:"owner",l:"Owner / Admin"},{k:"tech",l:"Technician"}].map(r=>html`<button key=${r.k} type="button" class=${"chip"+(((settings.userRole||"owner")===r.k)?" active":"")} onClick=${()=>update("userRole",r.k)}>${r.l}</button>`)}
        </div>
        <div style=${{fontSize:11,color:"var(--t3)",marginTop:6,lineHeight:1.5}}>
          ${isOwner?"Owner can edit all pricing rules, tier pricing, vehicle add-ons, and weekly expenses.":"Technician can log jobs and set a final price, but cannot edit business pricing rules."}
        </div>
      </div>
    </div>

    <div class="section-label">Business</div>
    <div class="card card-pad stack">
      <div><label style=${lbl}>Business name</label>
        <input type="text" value=${settings.businessName||""} onChange=${e=>update("businessName",e.target.value)} style=${inp}/>
      </div>
      <div><label style=${lbl}>Google review URL</label>
        <input type="url" value=${settings.googleReviewUrl||""} onChange=${e=>update("googleReviewUrl",e.target.value)} placeholder="https://g.page/r/…" style=${inp}/>
        <div style=${{fontSize:11,color:"var(--t3)",marginTop:4}}>Used for the "Send Review" SMS template.</div>
      </div>
    </div>

    <div class="section-label">Owner</div>
    <div class="card card-pad stack">
      <div><label style=${lbl}>Owner name</label><input type="text" value=${settings.ownerName||""} onChange=${e=>update("ownerName",e.target.value)} placeholder="Your name" style=${inp}/></div>
      <div style=${{fontSize:11,color:"var(--t3)"}}>100% of net profit (after direct costs and weekly fixed expenses) goes to the owner.</div>
    </div>

    ${isOwner&&html`<div class="section-label">Pricing</div>
    <div class="card card-pad stack">
      <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <div><label style=${lbl}>Cost per mile ($)</label>
          <${MoneyInput} value=${settings.costPerMile!=null?settings.costPerMile:0.65}
            onCommit=${v=>update("costPerMile",v===""?0.65:v)} style=${inp}/>
        </div>
        <div><label style=${lbl}>Skip threshold ($)</label>
          <${MoneyInput} value=${settings.skipThreshold!=null?settings.skipThreshold:70}
            onCommit=${v=>update("skipThreshold",v===""?70:v)} style=${inp}/>
        </div>
      </div>
      <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <div><label style=${lbl}>Default target profit ($)</label>
          <${MoneyInput} value=${settings.defaultTargetProfit!=null?settings.defaultTargetProfit:100}
            onCommit=${v=>update("defaultTargetProfit",v===""?100:v)} style=${inp}/>
        </div>
        <div><label style=${lbl}>Weekly goal ($)</label>
          <${MoneyInput} value=${settings.weeklyGoal!=null?settings.weeklyGoal:1200}
            onCommit=${v=>update("weeklyGoal",v===""?1200:v)} style=${inp}/>
        </div>
      </div>
    </div>`}

    ${isOwner&&html`<div class="section-label">Pricing rules per service</div>
    <div class="card card-pad stack">
      <div style=${{fontSize:12,color:"var(--t3)",lineHeight:1.5}}>Toggle services on/off, set base price (the suggested price floor), and minimum profit per job.</div>
      ${SERVICE_KEYS.map(svc=>{
        const rule=(settings.servicePricing&&settings.servicePricing[svc])||DEFAULT_SERVICE_PRICING[svc]||{enabled:true,basePrice:90,minProfit:60};
        const updRule=(k,v)=>update("servicePricing",{...(settings.servicePricing||DEFAULT_SERVICE_PRICING),[svc]:{...rule,[k]:v}});
        return html`<div key=${svc} style=${{padding:"10px 0",borderBottom:"1px solid var(--border)"}}>
          <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,marginBottom:8}}>
            <div style=${{fontWeight:700,color:"var(--t1)",fontSize:14,flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${svc}</div>
            <label style=${{display:"inline-flex",alignItems:"center",gap:6,fontSize:11,color:rule.enabled!==false?"var(--green)":"var(--t3)",fontWeight:700}}>
              <input type="checkbox" checked=${rule.enabled!==false} onChange=${e=>updRule("enabled",e.target.checked)}/>
              ${rule.enabled!==false?"ON":"OFF"}
            </label>
          </div>
          <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div><label style=${{...lbl,fontSize:10}}>Base price ($)</label>
              <${MoneyInput} value=${rule.basePrice!=null?rule.basePrice:0}
                onCommit=${v=>updRule("basePrice",v===""?0:v)}
                style=${{...inp,padding:"8px 10px",fontSize:14}}/>
            </div>
            <div><label style=${{...lbl,fontSize:10}}>Min profit ($)</label>
              <${MoneyInput} value=${rule.minProfit!=null?rule.minProfit:0}
                onCommit=${v=>updRule("minProfit",v===""?0:v)}
                style=${{...inp,padding:"8px 10px",fontSize:14}}/>
            </div>
          </div>
        </div>`;
      })}
    </div>

    <div class="section-label">Tier pricing — Tire Replacement (we supply)</div>
    <div class="card card-pad stack">
      <div style=${{fontSize:12,color:"var(--t3)",lineHeight:1.5}}>Target profit per job by tire quantity. Vehicle add-ons stack on top.</div>
      <div style=${{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8}}>
        ${[1,2,3,4].map(q=>{
          const tier=settings.replacementTier||DEFAULT_REPLACEMENT_TIER;
          const cur=tier[q]!=null?tier[q]:DEFAULT_REPLACEMENT_TIER[q];
          return html`<div key=${"r"+q}><label style=${{...lbl,fontSize:10}}>${q} tire${q>1?"s":""} ($)</label>
            <${MoneyInput} value=${cur}
              onCommit=${v=>update("replacementTier",{...(settings.replacementTier||DEFAULT_REPLACEMENT_TIER),[q]:v===""?DEFAULT_REPLACEMENT_TIER[q]:v})}
              style=${{...inp,padding:"8px 10px",fontSize:14}}/>
          </div>`;
        })}
      </div>
      <div><label style=${{...lbl,fontSize:10}}>5+ tires: $4-tire price + this per extra tire ($)</label>
        <${MoneyInput}
          value=${(settings.replacementTier||DEFAULT_REPLACEMENT_TIER).extra!=null?(settings.replacementTier||DEFAULT_REPLACEMENT_TIER).extra:DEFAULT_REPLACEMENT_TIER.extra}
          onCommit=${v=>update("replacementTier",{...(settings.replacementTier||DEFAULT_REPLACEMENT_TIER),extra:v===""?DEFAULT_REPLACEMENT_TIER.extra:v})}
          style=${{...inp,padding:"8px 10px",fontSize:14}}/>
      </div>
    </div>

    <div class="section-label">Tier pricing — Tire Installation (customer supplied)</div>
    <div class="card card-pad stack">
      <div style=${{fontSize:12,color:"var(--t3)",lineHeight:1.5}}>Flat install rates when the customer brings their own tires.</div>
      <div style=${{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8}}>
        ${[1,2,3,4].map(q=>{
          const tier=settings.installFlatTier||DEFAULT_INSTALL_FLAT_TIER;
          const cur=tier[q]!=null?tier[q]:DEFAULT_INSTALL_FLAT_TIER[q];
          return html`<div key=${"i"+q}><label style=${{...lbl,fontSize:10}}>${q} tire${q>1?"s":""} ($)</label>
            <${MoneyInput} value=${cur}
              onCommit=${v=>update("installFlatTier",{...(settings.installFlatTier||DEFAULT_INSTALL_FLAT_TIER),[q]:v===""?DEFAULT_INSTALL_FLAT_TIER[q]:v})}
              style=${{...inp,padding:"8px 10px",fontSize:14}}/>
          </div>`;
        })}
      </div>
      <div><label style=${{...lbl,fontSize:10}}>5+ tires: $4-tire price + this per extra tire ($)</label>
        <${MoneyInput}
          value=${(settings.installFlatTier||DEFAULT_INSTALL_FLAT_TIER).extra!=null?(settings.installFlatTier||DEFAULT_INSTALL_FLAT_TIER).extra:DEFAULT_INSTALL_FLAT_TIER.extra}
          onCommit=${v=>update("installFlatTier",{...(settings.installFlatTier||DEFAULT_INSTALL_FLAT_TIER),extra:v===""?DEFAULT_INSTALL_FLAT_TIER.extra:v})}
          style=${{...inp,padding:"8px 10px",fontSize:14}}/>
      </div>
    </div>

    <div class="section-label">Vehicle profit add-ons</div>
    <div class="card card-pad stack">
      <div style=${{fontSize:12,color:"var(--t3)",lineHeight:1.5}}>Extra profit added on top of the base/tier price for larger vehicles.</div>
      ${VEHICLE_TYPES.map(v=>{
        const vp=(settings.vehiclePricing&&settings.vehiclePricing[v])||DEFAULT_VEHICLE_PRICING[v]||{addOnProfit:0};
        const cur=vp.addOnProfit!=null?vp.addOnProfit:0;
        return html`<div key=${v} style=${{display:"grid",gridTemplateColumns:"1fr 110px",gap:8,alignItems:"center",padding:"6px 0",borderBottom:"1px solid var(--border)"}}>
          <div style=${{fontWeight:600,color:"var(--t1)",fontSize:14}}>${v}</div>
          <${MoneyInput} value=${cur}
            onCommit=${nv=>update("vehiclePricing",{...(settings.vehiclePricing||DEFAULT_VEHICLE_PRICING),[v]:{...vp,addOnProfit:nv===""?0:nv}})}
            style=${{...inp,padding:"8px 10px",fontSize:14,textAlign:"right",fontFamily:'"IBM Plex Mono",monospace'}}/>
        </div>`;
      })}
    </div>`}

    ${!isOwner&&html`<div class="card card-pad" style=${{textAlign:"center",color:"var(--t3)",fontSize:13}}>
      🔒 Pricing rules, tier pricing, and vehicle add-ons are locked for technician accounts. Switch to Owner role above to edit.
    </div>`}

    <div class="section-label">Recurring fixed expenses</div>
    <div class="card card-pad stack">
      <div style=${{fontSize:12,color:"var(--t3)"}}>Toggle items off to exclude them from the weekly fixed allocation.</div>
      ${(settings.expenses||[]).map(e=>html`<div key=${e.id} style=${{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
        <input type="checkbox" checked=${e.active!==false} onChange=${ev=>update("expenses",(settings.expenses||[]).map(x=>x.id===e.id?{...x,active:ev.target.checked}:x))}/>
        <input type="text" value=${e.name} onChange=${ev=>update("expenses",(settings.expenses||[]).map(x=>x.id===e.id?{...x,name:ev.target.value}:x))} style=${{...inp,padding:"6px 8px",flex:1}}/>
        <${MoneyInput} value=${e.amount} onCommit=${v=>update("expenses",(settings.expenses||[]).map(x=>x.id===e.id?{...x,amount:v===""?0:v}:x))} style=${{...inp,padding:"6px 8px",width:90,textAlign:"right",fontFamily:'"IBM Plex Mono",monospace'}}/>
      </div>`)}
      <button class="btn sm" onClick=${()=>update("expenses",[...(settings.expenses||[]),{id:uid(),name:"New expense",amount:0,active:true}])}>+ Add fixed expense</button>
    </div>

    <div class="section-label">Data</div>
    <div class="card card-pad stack">
      <div style=${{display:"flex",gap:8,flexWrap:"wrap"}}>
        <button class="btn" onClick=${exportCSV}>📊 Export jobs CSV</button>
        <button class="btn" onClick=${exportBackup}>💾 Backup JSON</button>
      </div>
    </div>

    <div style=${{textAlign:"center",fontSize:11,color:"var(--t3)",padding:"20px 0",fontFamily:'"IBM Plex Mono",monospace'}}>
      N & K On Time v10 · Firebase Sync
    </div>
  </div></div>`;
}

// ── ToastHost ───────────────────────────────────────────────────────────────
function ToastHost({toasts}) {
  return html`<div style=${{position:"fixed",bottom:88,left:0,right:0,display:"flex",flexDirection:"column",alignItems:"center",gap:8,pointerEvents:"none",zIndex:9999,padding:"0 16px"}}>
    ${toasts.map(t=>html`<div key=${t.id} style=${{
      background:t.kind==="err"?"linear-gradient(135deg,#ef4444,#dc2626)":t.kind==="ok"?"linear-gradient(135deg,#22c55e,#16a34a)":"linear-gradient(135deg,#3b82f6,#2563eb)",
      color:"#fff",padding:"10px 20px",borderRadius:24,fontSize:13,fontWeight:600,
      boxShadow:"0 6px 20px rgba(0,0,0,.45)",animation:"toastIn .25s ease",maxWidth:"100%"
    }}>${t.msg}</div>`)}
  </div>`;
}

// ── App ─────────────────────────────────────────────────────────────────────
const WIPE_KEY = "nk_inv_wiped_at";

function App() {
  // Auth
  const [user,setUser]=useState(null);
  const [authReady,setAuthReady]=useState(false);
  const [loading,setLoading]=useState(true);

  // Core state — local-first with Firebase sync overlay
  const [jobs,setJobs]=useState(()=>migrateOldJobs());
  const [settings,setSettings]=useState(()=>({...DEFAULT_SETTINGS,...load(KEYS.settings,{})}));
  const [inventory,setInventory]=useState(()=>{
    const stored=load(KEYS.inventory,null);
    return Array.isArray(stored)?stored:DEFAULT_INVENTORY.map(sanitizeInvItem);
  });
  const [expenses,setExpenses]=useState(()=>load(KEYS.expenses,[]));

  // UI
  const [tab,setTab]=useState("dashboard");
  const [form,setForm]=useState(()=>EMPTY_JOB());
  const [recentSizes,setRecentSizes]=useState(()=>load(KEYS.sizes,[]));
  const [syncStatus,setSyncStatus]=useState("local");
  const [toasts,setToasts]=useState([]);
  const toastIdRef=useRef(0);

  const toast=useCallback((msg,kind)=>{
    const id=++toastIdRef.current;
    setToasts(p=>[...p,{id,msg,kind}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),2400);
  },[]);

  // Auth listener
  useEffect(()=>{
    if(!_auth){ setUser({uid:"local"}); setAuthReady(true); setLoading(false); return; }
    const unsub=_auth.onAuthStateChanged(u=>{
      setUser(u||null);
      setAuthReady(true);
      setLoading(false);
    });
    return ()=>unsub();
  },[]);

  // Persist locally
  useEffect(()=>persist(KEYS.jobs,jobs),[jobs]);
  useEffect(()=>persist(KEYS.settings,settings),[settings]);
  useEffect(()=>persist(KEYS.inventory,inventory),[inventory]);

  // One-time seed (v2): purges any leftover placeholder inventory rows from
  // the original DEFAULT_INVENTORY (id starts with "inv001"-"inv052"), then
  // merges NK_SEED_INVENTORY using the bulk-upload dedupe logic.
  // Flagged by NK_SEED_KEY in localStorage so it runs once per device.
  useEffect(()=>{
    try {
      if (load(NK_SEED_KEY, false)) return;
      if (!Array.isArray(NK_SEED_INVENTORY) || NK_SEED_INVENTORY.length === 0) return;
      setInventory(prev => {
        const cur = Array.isArray(prev) ? prev : [];
        // Strip placeholder rows: ids matching "inv001"..."inv999" (the original
        // DEFAULT_INVENTORY seed pattern). These are the source of the stale
        // "OUT OF STOCK" rows the user reported.
        const purged = cur.filter(i => !/^inv0\d{2,3}$/.test(String(i.id||"")));
        const seedRows = NK_SEED_INVENTORY.map(i => ({ ok: true, item: i }));
        const { nextInventory, added, merged } = mergeBulkInventory(purged, seedRows);
        const purgedCount = cur.length - purged.length;
        if (toast) toast(`Inventory seeded: ${added} added, ${merged} merged${purgedCount?", "+purgedCount+" placeholders removed":""}`, "ok");
        return nextInventory;
      });
      persist(NK_SEED_KEY, true);
    } catch (e) { console.warn("seed inventory:", e); }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);
  useEffect(()=>persist(KEYS.expenses,expenses),[expenses]);
  useEffect(()=>persist(KEYS.sizes,recentSizes),[recentSizes]);

  // Firebase sync overlay
  useEffect(()=>{
    if(!user||isLocalUser(user)||!_db){ setSyncStatus("local"); return; }
    setSyncStatus("syncing");
    const unsubs=[];
    let received=0;
    const checkConnected=()=>{ received++; if(received>=4) setSyncStatus("connected"); };

    unsubs.push(fbListen(jobCol(),docs=>{
      const wipedAt=Number(load(WIPE_KEY,0))||0;
      if(Date.now()-wipedAt < 10000) { checkConnected(); return; }
      const hyd=docs.map(hydrateJobDoc).map(sanitizeJob);
      setJobs(hyd);
      checkConnected();
    }));
    unsubs.push(fbListen(invCol(),docs=>{
      const wipedAt=Number(load(WIPE_KEY,0))||0;
      if(Date.now()-wipedAt < 10000) { checkConnected(); return; }
      setInventory(docs.map(sanitizeInvItem));
      checkConnected();
    }));
    unsubs.push(fbListen(expCol(),docs=>{
      setExpenses(docs);
      checkConnected();
    }));
    if(settingDoc()){
      const u=settingDoc().onSnapshot(d=>{
        if(d.exists){
          const h=hydrateSettingsDoc(d.data());
          setSettings(p=>({...p,...h}));
        }
        checkConnected();
      },e=>console.warn("settings sync:",e));
      unsubs.push(u);
    }
    return ()=>unsubs.forEach(u=>{try{u();}catch{}});
  },[user]);

  // Job operations
  const saveJob=useCallback(async(job)=>{
    setJobs(prev=>{
      const i=prev.findIndex(j=>j.id===job.id);
      const arr=prev.slice();
      if(i>=0) arr[i]=job; else arr.push(job);
      return arr;
    });
    if(job.tireSize){
      setRecentSizes(prev=>[job.tireSize,...prev.filter(s=>s!==job.tireSize)].slice(0,12));
    }
    if(user&&!isLocalUser(user)) await fbSet(jobCol(),job.id,job);
  },[user]);

  const deleteJob=useCallback(async(j)=>{
    if(!confirm("Delete this job?")) return;
    setJobs(prev=>prev.filter(x=>x.id!==j.id));
    if(j.inventoryDeductions) restoreInventoryDeduction(j.inventoryDeductions,setInventory);
    if(user&&!isLocalUser(user)) await fbDel(jobCol(),j.id);
    toast("Job deleted","ok");
  },[user,toast]);

  const editJob=useCallback((j)=>{ setForm({...j}); setTab("add"); },[]);
  const onInvoice=useCallback((j)=>{ sendInvoice(j,settings); },[settings]);
  const onReview=useCallback((j)=>{
    openReviewSMS(j.customerPhone,settings.googleReviewUrl,j.customerName,j.service,j.area);
  },[settings]);

  // Settings sync (debounced)
  useEffect(()=>{
    if(!user||isLocalUser(user)||!settingDoc()) return;
    const t=setTimeout(()=>{
      try{ settingDoc().set(settings,{merge:true}); }catch(e){console.warn(e);}
    },500);
    return ()=>clearTimeout(t);
  },[settings,user]);

  // Inventory sync (debounced batch)
  useEffect(()=>{
    if(!user||isLocalUser(user)||!_db) return;
    const t=setTimeout(()=>{
      const ops=inventory.map(i=>({type:"set",ref:invCol().doc(String(i.id)),data:i}));
      fbBatch(ops);
    },800);
    return ()=>clearTimeout(t);
  },[inventory,user]);

  // Expenses sync (debounced batch)
  useEffect(()=>{
    if(!user||isLocalUser(user)||!_db) return;
    const t=setTimeout(()=>{
      const ops=expenses.map(e=>({type:"set",ref:expCol().doc(String(e.id)),data:e}));
      fbBatch(ops);
    },800);
    return ()=>clearTimeout(t);
  },[expenses,user]);

  const onSignOut=useCallback(()=>{
    if(_auth) _auth.signOut().catch(()=>{});
  },[]);

  // Loading screen
  if(loading){
    return html`<div style=${{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#0a0a0f"}}>
      <img src=${LOGO_SRC} alt="NK" onError=${e=>e.target.style.display="none"} class="logo-pulse" style=${{width:80,height:80,objectFit:"contain",borderRadius:18,marginBottom:16,boxShadow:"0 4px 20px rgba(0,0,0,.6)"}}/>
      <div class="shimmer-text" style=${{fontSize:20,fontWeight:700}}>N & K On Time</div>
      <div style=${{color:"#555",fontSize:12,marginTop:6}}>Loading…</div>
    </div>`;
  }

  // Auth screen
  if(_auth && authReady && !user){
    return html`<${AuthScreen} onAuth=${u=>setUser(u)}/>`;
  }

  // Bottom nav tabs
  const tabs=[
    {id:"dashboard",label:"Home",ico:"🏠"},
    {id:"add",label:"Add",ico:"＋"},
    {id:"history",label:"History",ico:"📋"},
    {id:"inventory",label:"Stock",ico:"🛞"},
    {id:"expenses",label:"$",ico:"💵"},
    {id:"payouts",label:"Pay",ico:"💰"},
    {id:"settings",label:"Settings",ico:"⚙️"},
  ];

  return html`<div class="app" style=${{height:"100%",display:"flex",flexDirection:"column"}}>
    <${Header} syncStatus=${syncStatus} onSignOut=${user&&!isLocalUser(user)?onSignOut:null}/>
    <div style=${{flex:1,overflow:"auto",WebkitOverflowScrolling:"touch"}}>
      ${tab==="dashboard"&&html`<${Dashboard} jobs=${jobs} settings=${settings} setTab=${setTab} inventory=${inventory} onRepeat=${j=>{setForm({...j,id:"",date:TODAY(),startTime:""});setTab("add");}} onStartJob=${()=>setTab("add")}/>`}
      ${tab==="add"&&html`<${AddJob} form=${form} setForm=${setForm} onSave=${saveJob} settings=${settings} recentSizes=${recentSizes} inventory=${inventory} toast=${toast}/>`}
      ${tab==="history"&&html`<${History} jobs=${jobs} settings=${settings} onEdit=${editJob} onDelete=${deleteJob} onInvoice=${onInvoice} onReview=${onReview}/>`}
      ${tab==="inventory"&&html`<${Inventory} inventory=${inventory} setInventory=${setInventory} toast=${toast}/>`}
      ${tab==="expenses"&&html`<${Expenses} expenses=${expenses} setExpenses=${setExpenses} toast=${toast}/>`}
      ${tab==="payouts"&&html`<${Payouts} jobs=${jobs} expenses=${expenses} settings=${settings}/>`}
      ${tab==="settings"&&html`<${Settings} settings=${settings} setSettings=${setSettings} jobs=${jobs} inventory=${inventory} toast=${toast}/>`}
    </div>
    <div class="bottom-nav">
      ${tabs.map(t=>html`<button key=${t.id} class=${"nav-btn"+(tab===t.id?" active":"")} data-id=${t.id} onClick=${()=>{setTab(t.id);haptic(8);}}>
        <div class="ico">${t.ico}</div>
        <div>${t.label}</div>
      </button>`)}
    </div>
    <${ToastHost} toasts=${toasts}/>
  </div>`;
}

// ── Mount ───────────────────────────────────────────────────────────────────
const _rootEl = document.getElementById("root");
if (_rootEl) {
  const root = ReactDOM.createRoot(_rootEl);
  root.render(React.createElement(ErrorBoundary, null, React.createElement(App)));
}
</script>
</body>
</html>
