<style>
  :root {
    --bg:          #0a0a0f;
    --s1:          #13131a;
    --s2:          #1c1c26;
    --s3:          #242432;
    --s4:          #2e2e40;
    --border:      rgba(255,255,255,.06);
    --border2:     rgba(255,255,255,.03);
    --t1: #f0f0fa;
    --t2: #8888a8;
    --t3: #44445a;
    --blue:        #4f8ef7;
    --blue-dim:    rgba(79,142,247,.12);
    --blue-glow:   rgba(79,142,247,.25);
    --orange:      #ff7d3b;
    --orange-dim:  rgba(255,125,59,.12);
    --orange-glow: rgba(255,125,59,.3);
    --green:       #22c55e;
    --green-dim:   rgba(34,197,94,.12);
    --red:         #ef4444;
    --red-dim:     rgba(239,68,68,.10);
    --red-bg:      rgba(239,68,68,.10);
    --amber:       #f59e0b;
    --amber-dim:   rgba(245,158,11,.10);
    --amber-bg:    rgba(245,158,11,.10);
    --gold:        #c8a44a;
    --gold-dim:    rgba(200,164,74,.12);
    --gold-bg:     rgba(200,164,74,.12);
    --r1:   22px;
    --r2:   16px;
    --r3:   12px;
    --r4:   8px;
    --r-sm: 12px;
    --r-xs: 8px;
    --sh-card:  0 1px 0 rgba(255,255,255,.04) inset, 0 4px 24px rgba(0,0,0,.5);
    --sh-hero:  0 0 0 1px rgba(79,142,247,.2), 0 8px 40px rgba(79,142,247,.15);
    --sh-cta:   0 0 0 1px rgba(255,125,59,.25), 0 8px 32px rgba(255,125,59,.2);
    --sh-float: 0 12px 48px rgba(0,0,0,.7);
  }
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body,#root { height:100%; font-family:"IBM Plex Sans",sans-serif; background:var(--bg); overflow:hidden; color:var(--t1); }
  input,select,textarea,button { font-family:"IBM Plex Sans",sans-serif; }
  input,select,textarea { font-size:16px !important; color:var(--t1); }
  /* Prevent iOS zoom on focus + give every input a scroll-margin so scrollIntoView clears the bottom nav */
  input,select,textarea { scroll-margin-bottom:140px; scroll-margin-top:80px; }
  button { cursor:pointer; }
  .app { height:100%; display:flex; flex-direction:column; }
  .screen { background:var(--bg); min-height:100%; }
  /* Bottom padding has to clear: bottom-nav (64px) + safe-area + keyboard-floating-action breathing room */
  .page { padding:20px 16px calc(140px + env(safe-area-inset-bottom)); }

  @keyframes fadeSlideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeSlideIn { from{opacity:0;transform:translateX(-12px)} to{opacity:1;transform:translateX(0)} }
  @keyframes scaleIn    { from{opacity:0;transform:scale(.92)} to{opacity:1;transform:scale(1)} }
  @keyframes shimmer    { 0%{background-position:-200% center} 100%{background-position:200% center} }
  @keyframes heroGlow   { 0%,100%{opacity:.6} 50%{opacity:1} }

  .card-anim:nth-child(6){animation-delay:.14s}
  .card-anim:nth-child(n+7){animation:none !important; opacity:1}
  @media (prefers-reduced-motion: reduce) {
    .card-anim, .page-enter { animation:none !important; opacity:1 !important; transform:none !important; }
  }

// ── Tire size normalization ──────────────────────────────────────────────────
function normalizeTireSize(s) {
  if (!s) return "";
  const m = String(s).match(/(\d{3})\s*[\/\-\s]+\s*(\d{2,3})\s*[\/\-\s]*\s*R?\s*(\d{2})/i);
  if (!m) return "";
  return m[1] + "/" + m[2] + "R" + m[3];
}

function planInventoryDeduction(inventory, tireSize, qtyNeeded, preferredId) {
  const targetSize = normalizeTireSize(tireSize);
  if (!targetSize || !qtyNeeded || qtyNeeded <= 0) return null;

  const candidates = (inventory || [])
    .filter(i => normalizeTireSize(i.size) === targetSize && (Number(i.qty) || 0) > 0);

  if (candidates.length === 0) return null;

  const sorted = candidates.slice().sort((a, b) => {
    const ac = (String(a.condition||"new").toLowerCase() === "new") ? 0 : 1;
    const bc = (String(b.condition||"new").toLowerCase() === "new") ? 0 : 1;
    if (ac !== bc) return ac - bc;
    return (Number(b.qty) || 0) - (Number(a.qty) || 0);
  });

  const ordered = preferredId
    ? [
        ...sorted.filter(r => String(r.id) === String(preferredId)),
        ...sorted.filter(r => String(r.id) !== String(preferredId)),
      ]
    : sorted;

  const plan = [];
  let remaining = qtyNeeded;
  for (const row of ordered) {
    if (remaining <= 0) break;
    const have = Number(row.qty) || 0;
    const take = Math.min(have, remaining);
    plan.push({
      id: String(row.id),
      size: String(row.size || ""),
      condition: String(row.condition || "New"),
      before: have,
      deducted: take,
      after: have - take,
    });
    remaining -= take;
  }

  return { plan, totalDeducted: qtyNeeded - remaining, shortfall: remaining };
}

function applyInventoryDeduction(plan, setInventory) {
  if (!plan || !Array.isArray(plan.plan) || plan.plan.length === 0) return;
  const byId = {};
  plan.plan.forEach(step => { byId[step.id] = step.after; });
  setInventory(prev => {
    const arr = Array.isArray(prev) ? prev : [];
    return arr.map(i => byId[i.id] !== undefined ? {...i, qty: byId[i.id]} : i);
  });
}

function restoreInventoryDeduction(deductions, setInventory) {
  if (!Array.isArray(deductions) || deductions.length === 0) return;
  const addMap = {};
  deductions.forEach(d => { addMap[d.id] = (addMap[d.id] || 0) + (Number(d.deducted) || 0); });
  setInventory(prev => {
    const arr = Array.isArray(prev) ? prev : [];
    return arr.map(i => addMap[i.id] ? {...i, qty: (Number(i.qty)||0) + addMap[i.id]} : i);
  });
}

const TODAY    = () => new Date().toLocaleDateString("en-CA", {timeZone:"America/New_York"});
const NOW_HHMM = () => {
  const d = new Date();
  const f = new Intl.DateTimeFormat("en-US", { timeZone:"America/New_York", hour12:false, hour:"2-digit", minute:"2-digit" });
  return f.format(d).replace(/^24/, "00");
};
const fmtTime = (hhmm) => {
  if (!hhmm || typeof hhmm !== "string") return "";
  const m = hhmm.match(/^(\d{1,2}):(\d{2})/);
  if (!m) return "";
  let h = Number(m[1]); const mins = m[2];
  const ap = h >= 12 ? "PM" : "AM";
  h = h % 12; if (h === 0) h = 12;
  return h + ":" + mins + " " + ap;
};

const haptic = (ms = 10) => { try { if (navigator.vibrate) navigator.vibrate(ms); } catch(e) {} };

// ── Mobile keyboard handling ────────────────────────────────────────────────
// On iOS Safari and Android Chrome, focusing an input often leaves it hidden
// behind the keyboard or the bottom nav. We scroll the focused element into
// the visible area after a short delay (giving the keyboard time to slide up).
(function installKeyboardScrollFix() {
  if (typeof document === "undefined") return;
  const FOCUSABLE = "input,select,textarea";
  const handler = (ev) => {
    const el = ev.target;
    if (!el || !el.matches || !el.matches(FOCUSABLE)) return;
    // Wait for the keyboard to appear, then scroll the input into view with
    // enough margin to clear both the keyboard and the bottom nav.
    setTimeout(() => {
      try {
        if (typeof el.scrollIntoView === "function") {
          el.scrollIntoView({ behavior: "smooth", block: "center" });
        }
      } catch(e) {}
    }, 280);
  };
  document.addEventListener("focusin", handler, true);
})();

function useCountUp(target, durationMs = 700) {
  const [value, setValue] = useState(0);
  const startedRef = useRef(false);
  useEffect(() => {
    if (startedRef.current) {
      setValue(target);
      return;
    }
    startedRef.current = true;
    const t0 = performance.now();
    let raf = 0;
    const tick = (now) => {
      const elapsed = now - t0;
      const p = Math.min(1, elapsed / durationMs);
      const eased = 1 - Math.pow(1 - p, 3);
      setValue(target * eased);
      if (p < 1) raf = requestAnimationFrame(tick);
      else setValue(target);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target]);
  return value;
}

const INSTALL_FLAT_PRICING = {1:90, 2:140, 3:190, 4:220};
const installFlatTotal = (qty, settings) => {
  const tier = (settings && settings.installFlatTier) || DEFAULT_INSTALL_FLAT_TIER;
  const n = Number(qty);
  const q = (Number.isFinite(n) && n >= 1) ? Math.floor(n) : 1;
  if (tier[q] != null) return Number(tier[q]);
  const four = Number(tier[4] || INSTALL_FLAT_PRICING[4]);
  const extra = Number(tier.extra != null ? tier.extra : 30);
  return four + (q - 4) * extra;
};

const REPLACEMENT_TIER_PRICING = {1:120, 2:220, 3:320, 4:400};
const replacementTierTotal = (qty, settings) => {
  const tier = (settings && settings.replacementTier) || DEFAULT_REPLACEMENT_TIER;
  const n = Number(qty);
  const q = (Number.isFinite(n) && n >= 1) ? Math.floor(n) : 1;
  if (tier[q] != null) return Number(tier[q]);
  const four = Number(tier[4] || REPLACEMENT_TIER_PRICING[4]);
  const extra = Number(tier.extra != null ? tier.extra : 100);
  return four + (q - 4) * extra;
};

const isWeSupplyTireJob = j => {
  if (!j) return false;
  if (!isTireMaterialService(j.service)) return false;
  if (isCustomerSuppliedInstall(j)) return false;
  return true;
};

const isCustomerSuppliedInstall = j =>
  /installation|mount.*balance/i.test(String(j && j.service || "")) &&
  String(j && j.tireSource || "") === "Customer supplied";

function distancePremium(miles) {
  const m = Number(miles||0);
  if (m <= 10) return 0;
  if (m <= 25) return 15;
  return 35;
}

function premiums(j) {
  if (!j) return 0;
  let p = 0;
  if (j.emergency) p += 20;
  if (j.lateNight) p += 20;
  if (j.highway)   p += 15;
  if (j.weekend)   p += 10;
  if (j.difficulty === "medium") p += 15;
  if (j.difficulty === "high")   p += 30;
  return p;
}

function getServicePricing(service, s) {
  const sp = (s && s.servicePricing) || DEFAULT_SERVICE_PRICING;
  return sp[service] || DEFAULT_SERVICE_PRICING[service] || {enabled:true, basePrice:90, minProfit:60};
}
function getVehicleAddOn(vehicleType, s) {
  const vp = (s && s.vehiclePricing) || DEFAULT_VEHICLE_PRICING;
  const v  = vp[vehicleType] || DEFAULT_VEHICLE_PRICING[vehicleType] || {addOnProfit:0};
  return Number(v.addOnProfit || 0);
}

function calculateJobPricing(job, settings) {
  const s = settings || {};
  const j = job || {};
  const costPerMile = Math.max(0, Number(s.costPerMile || 0.65));

  const miles       = Math.max(0, Number(j.miles || 0));
  const qty         = Math.max(1, Number(j.qty || 1));
  const tireCost    = isCustomerSuppliedInstall(j)
    ? 0
    : Math.max(0, Number(j.tireCost || 0)) * qty;
  const miscCost    = Math.max(0, Number(j.miscCost || 0));
  const trivialDistance = miles <= 1;
  const travelCost  = trivialDistance ? 0 : r2(miles * costPerMile);
  const directCost  = r2(tireCost + miscCost + travelCost);
  const revenue     = Math.max(0, Number(j.revenue || 0));
  const actualProfit= r2(revenue - directCost);

  const svcRule    = getServicePricing(j.service, s);
  const vehicleAdd = Math.max(0, getVehicleAddOn(j.vehicleType, s));
  const baseTarget = (svcRule && svcRule.minProfit != null && !isNaN(Number(svcRule.minProfit)))
    ? Number(svcRule.minProfit)
    : Number(s.defaultTargetProfit || 100);

  const isFlatInstall = isCustomerSuppliedInstall(j);
  const isWeSupply    = isWeSupplyTireJob(j);

  let targetProfit;
  if (isFlatInstall) {
    targetProfit = installFlatTotal(qty, s) + vehicleAdd;
  } else if (isWeSupply) {
    targetProfit = replacementTierTotal(qty, s) + vehicleAdd;
  } else {
    targetProfit = baseTarget + vehicleAdd;
  }

  const distanceAdj   = distancePremium(miles);
  const urgencyBase   = premiums(j);
  const urgencyPremium= urgencyBase + distanceAdj;

  const raw = directCost + targetProfit + urgencyPremium;
  const suggestedPrice = Math.ceil(raw / 5) * 5;

  const premiumPrice = Math.ceil((suggestedPrice + 20) / 5) * 5;

  const skip = Number(s.skipThreshold || 70);
  let decisionLabel = "Take it";
  let decisionType  = "take";
  if (isTireMaterialService(j.service) && (j.tireSource === "Bought for this job") && tireCost <= 0) {
    decisionLabel = "Missing tire cost";
    decisionType  = "missing";
  } else if (revenue > 0 && actualProfit < skip) {
    decisionLabel = "Low margin — increase price";
    decisionType  = "low";
  } else if (distanceAdj >= 35) {
    decisionLabel = "High distance — premium applied";
    decisionType  = "distance";
  } else if (revenue > 0 && actualProfit >= skip + 40) {
    decisionLabel = "Strong profit — take it";
    decisionType  = "strong";
  } else if (revenue === 0) {
    decisionLabel = "Estimated price";
    decisionType  = "estimate";
  }

  return {
    revenue, tireCost, miscCost, travelCost, directCost,
    targetProfit, urgencyPremium, distanceAdj, baseTarget, vehicleAdd,
    suggestedPrice, premiumPrice, actualProfit,
    decisionLabel, decisionType,
  };
}

function dedupeInventory(items) {
  const seen = {};
  (items||[]).filter(i=>(i.size||"").trim()).forEach(i => {
    const cond = (String(i.condition||"").toLowerCase() === "used") ? "used" : "new";
    const key = i.size.toLowerCase().replace(/\s+/g,"") + "|" + cond;
    if (!seen[key]) {

      if (!seen[key].cost && i.cost) seen[key].cost = i.cost;

  });

}

// Dedupe key: size + brand + condition + location (case-insensitive, normalized).
// Items sharing this key are merged: qty increases instead of creating duplicates.
function invDedupeKey(item) {
  return [
    normalizeTireSize(item.size||"") || (item.size||"").toLowerCase().trim(),
    String(item.brand||"").toLowerCase().trim(),
    String(item.condition||"New").toLowerCase().trim(),
    String(item.location||"").toLowerCase().trim(),
  ].join("|");
}

// Parse CSV-style bulk-upload text. Accepts:
//   tireSize, brand, condition, quantity, cost, sellingPrice, location, notes
// Returns {rows, errors} where rows is an array of {ok, item, errorMsg, raw}.
function parseBulkInventoryCSV(text) {
  const rows = [];
  const errors = [];
  if (!text || typeof text !== "string") return {rows, errors:["Empty input."]};
  // Split lines, drop blank lines and lines starting with # (comments).
  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l && !l.startsWith("#"));
  if (lines.length === 0) return {rows, errors:["No rows found."]};
  // Detect and skip a header row (case-insensitive match on "tireSize"/"size").
  const first = lines[0].toLowerCase();
  let startIdx = 0;
  if (first.includes("tiresize") || first.startsWith("size,") || first.startsWith("tire size")) {
    startIdx = 1;
  }
  for (let i = startIdx; i < lines.length; i++) {
    const raw = lines[i];
    // Split by comma, respecting quoted strings with commas inside.
    let cells = [];
    let buf = "", inQ = false;
    for (let c = 0; c < raw.length; c++) {
      const ch = raw[c];
      if (ch === '"') { inQ = !inQ; continue; }
      if (ch === "," && !inQ) { cells.push(buf.trim()); buf = ""; continue; }
      buf += ch;
    }
    cells.push(buf.trim());

    // If the line has only ONE cell (no commas), try parsing the loose
    // "<size> <condition> <qty> [<location/notes...>]" format. This lets users
    // paste the raw text format like "185/55/15 used 1" without converting.
    if (cells.length === 1 && cells[0].length > 0) {
      const loose = cells[0];
      // Normalize: 185/55/15 → 185/55R15 (insert R if missing); collapse \ to /
      const sizeMatch = loose.replace(/\\/g,"/").match(/^(\d{3}\/\d{2,3}\/\d{2,3}|\d{3}\/\d{2,3}R\d{2,3})\b/i);
      if (sizeMatch) {
        let size = sizeMatch[1].replace(/^(\d{3})\/(\d{2,3})\/(\d{2,3})$/, "$1/$2R$3");
        const rest = loose.slice(sizeMatch[0].length).trim();
        const condMatch = rest.match(/\b(new|used|use)\b/i);
        const condStr = condMatch ? (condMatch[1].toLowerCase()==="new"?"New":"Used") : "Used";
        const qtyMatch = rest.match(/\b(\d+)\b/);
        const qtyStr = qtyMatch ? qtyMatch[1] : "";
        // Detect "truck" / "in truck" as location
        const locStr = /\b(in\s+)?truck\b/i.test(rest) ? "Truck" : "";
        cells = [size, "", condStr, qtyStr, "", "", locStr, ""];
      }
    }

    const [tireSize="", brand="", condition="", quantity="", cost="", sellingPrice="", location="", notes=""] = cells;
    const rowNum = i + 1;
    const problems = [];
    if (!tireSize) problems.push("missing tire size");
    const qtyN = Number(quantity);
    // Allow qty 0 (out-of-stock entries). Only reject empty/non-numeric/negative.
    if (quantity === "" || !Number.isFinite(qtyN) || qtyN < 0) problems.push("missing/invalid quantity");
    const costN = Number(cost);
    if (cost && (!Number.isFinite(costN) || costN < 0)) problems.push("invalid cost");
    const sellN = Number(sellingPrice);
    if (sellingPrice && (!Number.isFinite(sellN) || sellN < 0)) problems.push("invalid selling price");
    const condNorm = /used/i.test(condition) ? "Used" : (condition ? "New" : "New");
    const item = {
      size: tireSize,
      brand,
      condition: condNorm,
      qty: Number.isFinite(qtyN) && qtyN >= 0 ? Math.floor(qtyN) : 0,
      cost: Number.isFinite(costN) ? costN : 0,
      sellPrice: Number.isFinite(sellN) ? sellN : 0,
      location,
      notes,
    };
    rows.push({
      ok: problems.length === 0,
      errorMsg: problems.join(", "),
      item,
      raw,
      rowNum,
    });
    if (problems.length) errors.push(`Row ${rowNum}: ${problems.join(", ")}`);
  }
  return {rows, errors};
}

// Merge parsed rows into existing inventory, deduping by (size+brand+condition+location).
// Returns {nextInventory, added, merged}.
function mergeBulkInventory(existing, parsedRows) {
  const arr = Array.isArray(existing) ? existing.slice() : [];
  // Build a key->index map for fast dedupe lookup.
  const keyIdx = new Map();
  arr.forEach((it, idx) => { keyIdx.set(invDedupeKey(it), idx); });
  let added = 0, merged = 0;
  for (const r of parsedRows) {
    if (!r.ok) continue;
    const k = invDedupeKey(r.item);
    if (keyIdx.has(k)) {
      const idx = keyIdx.get(k);
      const cur = arr[idx];
      arr[idx] = {
        ...cur,
        qty: Number(cur.qty||0) + Number(r.item.qty||0),
        // Update cost/sellPrice/notes/location only if the new row supplies them.
        cost: r.item.cost > 0 ? r.item.cost : Number(cur.cost||0),
        sellPrice: r.item.sellPrice > 0 ? r.item.sellPrice : Number(cur.sellPrice||0),
        notes: r.item.notes || cur.notes || "",
        location: r.item.location || cur.location || "",
      };
      merged++;
    } else {
      const newItem = sanitizeInvItem({id:uid(), ...r.item});
      arr.push(newItem);
      keyIdx.set(k, arr.length - 1);
      added++;
    }
  }
  return {nextInventory: arr, added, merged};
}

function sanitizeInvItem(i) {
  if (i === null || i === undefined || typeof i !== "object") i = {};
  const rawCond = String(i.condition || "").toLowerCase();

  return {

    condition:cond,

// ── Error Boundary ────────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = {crashed:false, error:null}; }
  static getDerivedStateFromError(error) { return {crashed:true, error}; }
  componentDidCatch(error, info) { console.error("N&K On Time crash:", error, info); }
  render() {
    if (this.state.crashed) {
      return React.createElement("div", {
        style:{height:"100%",display:"flex",flexDirection:"column",alignItems:"center",
               justifyContent:"center",background:"#0a0a0f",padding:"32px",gap:16}
      },
        React.createElement("div",{style:{fontSize:40}},"⚠️"),
        React.createElement("div",{style:{color:"#f0f0fa",fontSize:18,fontWeight:700,textAlign:"center"}},"Something went wrong"),
        React.createElement("div",{style:{color:"#8888a8",fontSize:13,textAlign:"center",lineHeight:1.6,maxWidth:280}},
          "The app hit an error. Tap to recover."),
        React.createElement("div",{style:{color:"#44445a",fontSize:11,textAlign:"center",fontFamily:"monospace",maxWidth:320,wordBreak:"break-all",marginTop:4}},
          String(this.state.error||"").slice(0,140)),
        React.createElement("button",{
          onClick:()=>this.setState({crashed:false,error:null}),
          style:{background:"linear-gradient(135deg,#5a97ff,#3d7ef5)",color:"#fff",
                 border:"none",borderRadius:12,padding:"14px 28px",fontSize:15,
                 fontWeight:700,cursor:"pointer",marginTop:8}
        },"Reload App")
      );
    }
    return this.props.children;
  }
}

// ── Progress Ring ─────────────────────────────────────────────────────────────
function ProgressRing({size,stroke,pct,color,children}) {
  const radius = (size-stroke)/2;
  const circ = 2*Math.PI*radius;
  const offset = circ - (clamp(pct,0,100)/100)*circ;
  return html`<div class="progress-ring" style=${{width:size,height:size}}>
    <svg width=${size} height=${size}>
      <circle class="progress-ring-bg" cx=${size/2} cy=${size/2} r=${radius} strokeWidth=${stroke}/>
      <circle class="progress-ring-fill" cx=${size/2} cy=${size/2} r=${radius} strokeWidth=${stroke}
        stroke=${color} style=${{strokeDasharray:circ,strokeDashoffset:offset,color}}/>
    </svg>
    <div class="progress-ring-label">${children}</div>
  </div>`;
}

// ── MoneyInput ──────────────────────────────────────────────────────────────
// Controlled numeric input that holds a *local string* during editing so:
//  - user input is never reverted to a default while typing
//  - clearing the field is allowed (won't auto-fill)
//  - decimals work
//  - typing "0" doesn't trigger || fallback to defaults
//  - external value updates (e.g. settings sync from Firebase) DO sync back
//    when the input is not focused
// Commit is debounced via onBlur AND on each valid keystroke (so settings
// persist immediately without needing to blur).
function MoneyInput({value,onCommit,style,placeholder,disabled,fontSize}) {
  const fmt = v => (v==null||v==="")?"":String(v);
  const [local,setLocal]=useState(()=>fmt(value));
  const [focused,setFocused]=useState(false);
  // Sync external value into local state ONLY when not focused, so we don't
  // clobber the user's in-progress edit.
  useEffect(()=>{ if(!focused) setLocal(fmt(value)); },[value,focused]);
  const commit = (raw) => {
    const trimmed = String(raw||"").trim();
    if (trimmed === "") { onCommit(""); return; }
    const n = Number(trimmed);
    if (Number.isFinite(n)) onCommit(n);
  };
  return html`<input
    type="text" inputMode="decimal" pattern="[0-9.]*"
    value=${local}
    placeholder=${placeholder||"0"}
    disabled=${disabled||false}
    onFocus=${()=>setFocused(true)}
    onBlur=${e=>{ setFocused(false); commit(e.target.value); }}
    onChange=${e=>{
      const raw=e.target.value;
      // Allow only digits + a single decimal point. Empty string allowed.
      if (raw==="" || /^[0-9]*\.?[0-9]*$/.test(raw)) {
        setLocal(raw);
        // Commit live so settings sync; if intermediate (e.g. "1.") we still
        // pass the partial value but coerce only finite numbers.
        if (raw==="" || /^[0-9]+\.?[0-9]*$/.test(raw)) commit(raw);
      }
    }}
    style=${style}
  />`;
}

// ── CallCounter ──────────────────────────────────────────────────────────────
function CallCounter({jobsToday}) {
  const today = TODAY();
  const [calls, setCalls] = useState(() => {
    const data = load(KEYS.calls, {});
    return Number(data[today] || 0);
  });
  const [autoFlash, setAutoFlash] = useState(false);
  useEffect(() => {
    const handler = () => {
      const data = load(KEYS.calls, {});
      const next = Number(data[today] || 0);
      setCalls(prev => {
        if (next > prev) {
          setAutoFlash(true);
          setTimeout(() => setAutoFlash(false), 700);
        }
        return next;
      });
    };
    window.addEventListener("nk-calls-updated", handler);
    return () => window.removeEventListener("nk-calls-updated", handler);
  }, [today]);
  const update = (delta) => {
    const next = Math.max(0, calls + delta);
    setCalls(next);
    const data = load(KEYS.calls, {});
    data[today] = next;
    persist(KEYS.calls, data);
  };
  const showRate = calls > 0 ? Math.round((jobsToday / calls) * 100) : 0;
  return html`<div class="card card-anim" style=${{marginBottom:14,padding:"12px 14px"}}>
    <div style=${{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div>
        <div style=${{fontSize:9,fontWeight:800,textTransform:"uppercase",letterSpacing:"1.4px",color:"var(--t3)"}}>Today's Calls</div>
        <div style=${{fontSize:11,color:"var(--t3)",marginTop:2,fontFamily:'"IBM Plex Mono",monospace'}}>${calls} call${calls===1?"":"s"} · ${jobsToday} booked${calls>0?" · "+showRate+"% show":""}</div>
      </div>
      <div style=${{display:"flex",alignItems:"center",gap:6}}>
        <button class="press-scale" onClick=${()=>update(-1)} disabled=${calls===0} style=${{width:34,height:34,borderRadius:8,border:"1px solid var(--border)",background:"var(--card)",color:calls===0?"var(--t3)":"var(--t1)",fontSize:16,fontWeight:700,cursor:calls===0?"default":"pointer",opacity:calls===0?0.4:1}}>−</button>
        <div style=${{minWidth:32,textAlign:"center",fontFamily:'"IBM Plex Mono",monospace',fontSize:18,fontWeight:800,color:autoFlash?"var(--green)":"var(--t1)",transform:autoFlash?"scale(1.15)":"scale(1)",transition:"all .25s cubic-bezier(.34,1.56,.64,1)"}}>${calls}</div>
        <button class="press-scale" onClick=${()=>update(1)} style=${{width:34,height:34,borderRadius:8,border:"1px solid var(--blue)",background:"var(--blue)",color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer"}}>+</button>
      </div>
    </div>
  </div>`;
}

          <div style=${{fontFamily:'"IBM Plex Mono",monospace',fontSize:18,fontWeight:700,color:"var(--t1)",letterSpacing:"-1px"}}>${money(job.revenue||0)}</div>
          <div style=${{fontSize:10,color:"var(--t3)",marginTop:3}}>${job.payment||""}</div>
        </div>
      </div>`;
    })}</div>`:html`<${EmptyState} icon="🛞" title="Your first job awaits" sub="Log a tire change, repair, or roadside call to start tracking your week." action=${html`<button class="btn primary press-scale" onClick=${()=>setTab("add")}>Log First Job</button>`}/>`}
  </div></div>`;
}

// ── AddJob ──────────────────────────────────────────────────────────────────
function AddJob({form,setForm,onSave,settings,recentSizes,inventory,toast}) {
  const [priceMode,setPriceMode]=useState("suggested");
  const change=(k,v)=>setForm(p=>({...p,[k]:v}));
  const calc=calculateJobPricing(form,settings);

  const handleSave=()=>{
    if(!form.service){ toast&&toast("Pick a service first","err"); return; }
    const finalPrice = priceMode==="custom" ? Number(form.revenue||0)
      : priceMode==="premium" ? calc.premiumPrice
      : calc.suggestedPrice;
    if(!finalPrice||finalPrice<=0){ toast&&toast("Set a price","err"); return; }

    const job=sanitizeJob({
      ...form,
      id:form.id||uid(),
      revenue:finalPrice,
      date:form.date||TODAY(),
      startTime:form.startTime||NOW_HHMM(),
    });

    if(isTireMaterialService(job.service) && job.tireSource==="Inventory" && job.tireSize){
      const plan=planInventoryDeduction(inventory,job.tireSize,Number(job.qty||1),job.inventoryItemId);
      if(plan){
        job.inventoryDeductions=plan.plan;
        job.inventoryShortfall=plan.shortfall;
        job.inventoryDeducted=true;
      }
    }
    onSave(job);
    setForm(EMPTY_JOB());
    setPriceMode("suggested");
    haptic(15);
    toast&&toast("Job saved","ok");
  };

  useEffect(()=>{
    if(priceMode==="suggested") change("revenue",calc.suggestedPrice);
    else if(priceMode==="premium") change("revenue",calc.premiumPrice);
  // eslint-disable-next-line
  },[priceMode,form.service,form.qty,form.miles,form.tireCost,form.miscCost,form.tireSource,form.vehicleType]);

  const inp={width:"100%",border:"1px solid var(--border)",background:"var(--s3)",color:"var(--t1)",borderRadius:"var(--r3)",padding:"12px 14px",outline:"none",fontSize:15};
  const lbl={fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",color:"var(--t2)",marginBottom:6,display:"block"};

  return html`<div class="screen"><div class="page page-enter">
    <div class="section-label">Log a Job</div>

    <!-- 1. QUICK PRICING (top — visible without scrolling) -->
    <${QuickQuote} form=${form} settings=${settings} priceMode=${priceMode} setPriceMode=${setPriceMode}
      onApply=${v=>change("revenue",v)} onFormChange=${change}/>

    <!-- 2. SERVICE TYPE -->
    <div class="card card-pad stack" style=${{marginTop:12}}>
      <div><label style=${lbl}>Service</label>
        <select value=${form.service||""} onChange=${e=>change("service",e.target.value)} style=${inp}>
          ${SERVICE_OPTIONS.map(s=>html`<option key=${s} value=${s}>${s}</option>`)}
        </select>
      </div>
      <div><label style=${lbl}>Vehicle</label>
        <div class="chip-row">
          ${VEHICLE_TYPES.map(v=>html`<button key=${v} type="button" class=${"chip"+(form.vehicleType===v?" active":"")} onClick=${()=>change("vehicleType",v)}>${v}</button>`)}
        </div>
      </div>
      <div><label style=${lbl}>Date / Start time</label>
        <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <input type="date" value=${form.date||""} onChange=${e=>change("date",e.target.value)} style=${inp}/>
          <input type="time" value=${form.startTime||""} onChange=${e=>change("startTime",e.target.value)} style=${inp}/>
        </div>
      </div>
    </div>

    <!-- 3. CUSTOMER INFO -->
    <div class="card card-pad stack">
      <div><label style=${lbl}>Customer name (optional)</label>
        <input type="text" value=${form.customerName||""} onChange=${e=>change("customerName",e.target.value)} style=${inp}/>
      </div>
      <div><label style=${lbl}>Customer phone (optional)</label>
        <input type="tel" inputMode="tel" value=${form.customerPhone||""} onChange=${e=>change("customerPhone",e.target.value)} style=${inp}/>
      </div>
      <div><label style=${lbl}>Source</label>
        <div class="chip-row">
          ${SOURCE_QUICK.map(s=>html`<button key=${s.label} type="button" class=${"chip"+(form.source===s.label?" active":"")} onClick=${()=>change("source",s.label)}>${s.icon} ${s.label}</button>`)}
        </div>
      </div>
    </div>

    <!-- 4. LOCATION / CITY -->
    <div class="card card-pad stack">
      <div><label style=${lbl}>Service area</label>
        <${CityInput} value=${form.area||""} onChange=${v=>change("area",v)}/>
      </div>
    </div>

    <!-- 5 + 6. TIRE SIZE & INVENTORY SOURCE (only for tire-material services) -->
    ${isTireMaterialService(form.service)&&html`<div class="card card-pad stack">
      <div><label style=${lbl}>Tire size</label>
        <input type="text" placeholder="e.g. 225/65R17" value=${form.tireSize||""} onChange=${e=>change("tireSize",e.target.value)} style=${inp}/>
        ${recentSizes&&recentSizes.length>0&&html`<div class="chip-row" style=${{marginTop:8}}>
          ${recentSizes.slice(0,8).map(s=>html`<button key=${s} type="button" class=${"chip sm"+(form.tireSize===s?" active":"")} onClick=${()=>change("tireSize",s)}>${s}</button>`)}
        </div>`}
      </div>
      <div><label style=${lbl}>Tire source</label>
        <div class="chip-row">
          ${["Inventory","Bought for this job","Customer supplied"].map(t=>html`<button key=${t} type="button" class=${"chip"+(form.tireSource===t?" active":"")} onClick=${()=>change("tireSource",t)}>${t}</button>`)}
        </div>
        ${form.tireSource==="Inventory"&&form.tireSize&&(()=>{
          const norm=normalizeTireSize(form.tireSize);
          const matches=Array.isArray(inventory)?inventory.filter(i=>normalizeTireSize(i.size)===norm&&Number(i.qty||0)>0):[];
          const totalAvail=matches.reduce((t,i)=>t+Number(i.qty||0),0);
          if(matches.length===0) return html`<div style=${{padding:"8px 12px",background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.3)",borderRadius:8,fontSize:12,color:"var(--t2)",marginTop:8}}>⚠ Out of stock for ${form.tireSize}. Will use outside-sourced.</div>`;
          return html`<div style=${{padding:"8px 12px",background:"rgba(34,197,94,.08)",border:"1px solid rgba(34,197,94,.3)",borderRadius:8,fontSize:12,color:"var(--t2)",marginTop:8}}>✓ ${totalAvail} in stock${matches[0].brand?" · "+matches[0].brand:""}${matches[0].cost?" · $"+matches[0].cost+" each":""}</div>`;
        })()}
      </div>
      ${form.tireSource==="Customer supplied"&&isCustomerSuppliedInstall(form)&&(()=>{
        const t=settings.installFlatTier||DEFAULT_INSTALL_FLAT_TIER;
        return html`<div style=${{padding:"10px 12px",background:"rgba(251,146,60,.08)",border:"1px solid rgba(251,146,60,.3)",borderRadius:8,fontSize:12,color:"var(--t2)"}}>
          ⚠ Customer-supplied install: flat-rate pricing (1 tire ${money(t[1])}, 2 = ${money(t[2])}, 3 = ${money(t[3])}, 4 = ${money(t[4])}).
        </div>`;
      })()}
    </div>`}

    <!-- 7. PAYMENT STATUS -->
    <div class="card card-pad stack">
      <div><label style=${lbl}>Status</label>
        <select value=${form.status||"Completed"} onChange=${e=>change("status",e.target.value)} style=${inp}>
          ${STATUS_OPTIONS.map(st=>html`<option key=${st} value=${st}>${st}</option>`)}
        </select>
      </div>
      <div><label style=${lbl}>Payment method</label>
        <div class="chip-row">
          ${PAYMENT_OPTIONS.map(p=>html`<button key=${p.label} type="button" class=${"chip"+(form.payment===p.label?" active":"")} onClick=${()=>change("payment",p.label)}>${p.icon} ${p.label}</button>`)}
        </div>
      </div>
      <div><label style=${lbl}>Flags</label>
        <div class="chip-row">
          ${FLAGS.map(([k,label])=>html`<button key=${k} type="button" class=${"chip"+(form[k]?" active":"")} onClick=${()=>change(k,!form[k])}>${label}</button>`)}
        </div>
      </div>
    </div>

    <!-- 8. NOTES -->
    <div class="card card-pad stack">
      <div><label style=${lbl}>Note (prefix with [c] to show on invoice)</label>
        <textarea rows="2" value=${form.note||""} onChange=${e=>change("note",e.target.value)} style=${{...inp,resize:"vertical",minHeight:60}}/>
      </div>
    </div>

    <button class="btn primary press-scale" style=${{marginTop:8,width:"100%",fontSize:16,padding:"16px"}} onClick=${handleSave}>
      Save Job · ${money(priceMode==="custom"?Number(form.revenue||0):priceMode==="premium"?calc.premiumPrice:calc.suggestedPrice)}
    </button>
  </div></div>`;
}

// ── History row ─────────────────────────────────────────────────────────────

  const profit=jobGrossProfit(job,settings);

  return html`<div class="job-row card-anim" style=${{flexDirection:"column",alignItems:"stretch"}}>
    <div style=${{display:"flex",alignItems:"flex-start",gap:13,cursor:"pointer"}} onClick=${()=>setOpen(!open)}>
      <div class="job-icon">🛞</div>
      <div class="job-main">
        <div class="job-title">${job.service||"Tire Service"}${job.customerName?" — "+job.customerName:""}</div>
        <div class="job-meta">${job.area||""} · ${job.date||""}${job.tireSize?" · "+job.tireSize:""}${job.qty>1?" ×"+job.qty:""}</div>
        <div style=${{marginTop:6,display:"flex",gap:6,flexWrap:"wrap"}}>
          <span class=${"pill "+(pg?"green":po?"orange":"red")}>${money(profit)}</span>
          ${isStatusUncollected(job.status)&&html`<span class="pill gold">${job.status==="Pending"?"Pending":job.status}</span>`}

          ${job.payment&&html`<span class="pill gray">${job.payment}</span>`}
          ${job.tireSource&&isTireMaterialService(job.service)&&html`<span class="pill gray">${job.tireSource==="Inventory"?(Array.isArray(job.inventoryDeductions)&&job.inventoryDeductions.length>0?"📦 From Inventory":"📦 Inventory"):job.tireSource==="Customer supplied"?"🚗 Customer":"🛒 Outside"}</span>`}
        </div>
      </div>
      <div class="job-right">
        <div style=${{fontFamily:'"IBM Plex Mono",monospace',fontSize:18,fontWeight:700,color:"var(--t1)",letterSpacing:"-1px"}}>${money(job.revenue||0)}</div>
        <div style=${{fontSize:10,color:"var(--t3)",marginTop:3}}>${job.startTime?fmtTime(job.startTime):""}</div>

      <button class="btn sm" onClick=${e=>{e.stopPropagation();onInvoice&&onInvoice(job);}}>📄 Invoice</button>

      <button class="btn sm" onClick=${e=>{e.stopPropagation();onEdit&&onEdit(job);}}>✏️ Edit</button>
